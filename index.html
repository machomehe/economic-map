<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; connect-src 'self'; img-src 'self' data:;">
<meta name="description" content="경제 지표 간 인과관계를 시각적으로 탐색하는 인터랙티브 맵. 금리, 환율, 주식 등 26개 지표의 연쇄 효과를 확인하세요.">
<title>Economic Map — 경제 지표 인과관계 시각화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="d3.min.js"></script>
<style>
/* ── CSS Variables ── */
:root {
  --bg-primary: #0f0f14;
  --bg-surface: #1a1a24;
  --bg-card: #1e1e2e;
  --bg-bar: #16161eee;
  --bg-button: #23233a;
  --text-primary: #e2e8f0;
  --text-secondary: #cbd5e1;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --accent: #4f46e5;
  --accent-light: #6366f1;
  --border: #2a2a3a;
  --border-light: #3a3a5a;
  --color-up: #16a34a;
  --color-down: #dc2626;
  --color-cond: #ca8a04;
  --color-dim: #555;
  --link-opacity: 0.4;
  --node-dim-opacity: 0.08;
  --link-dim-opacity: 0.04;
  --transition-fast: 0.15s;
  --transition-normal: 0.25s;
}

/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg-primary); color:var(--text-primary);
  font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

/* ── SVG ── */
svg { display:block; width:100%; height:100%; touch-action:none; }
.cat-box { fill:var(--bg-surface); stroke-width:1; }
.cat-label { fill:var(--text-secondary); font-size:14px; font-weight:700; }

/* ── Node styles ── */
.node-circle { cursor:pointer; stroke-width:2.5; }
.node-rect   { cursor:pointer; stroke-width:1.5; }
.node-label  { fill:#fff; font-size:13px; font-weight:700; text-anchor:middle; pointer-events:none; }
.node-sub    { fill:var(--text-muted); font-size:10px; text-anchor:middle; pointer-events:none; }
.node-value  { font-size:10.5px; text-anchor:middle; pointer-events:none; }

/* ── Link ── */
.link-line { fill:none; stroke-width:1.6; opacity:var(--link-opacity); }
.link-hit  { fill:none; stroke:transparent; stroke-width:14; pointer-events:stroke; cursor:pointer; }

/* ── Focus styles for nodes ── */
.node-g { outline:none !important; -webkit-tap-highlight-color:transparent; }
.node-g:focus { outline:none !important; }
.node-g:focus-visible .node-circle,
.node-g:focus-visible .node-rect {
  stroke:var(--accent-light) !important;
  stroke-width:3 !important;
  filter:drop-shadow(0 0 6px var(--accent-light));
}

/* ── Highlight / Dim ── */
.node-dim  { opacity:var(--node-dim-opacity) !important; }
.link-dim  { opacity:var(--link-dim-opacity) !important; }
.link-hl   { opacity:0.95 !important; filter:drop-shadow(0 0 6px var(--glow)); }

/* ── Toast ── */
#link-toast {
  position:fixed; bottom:calc(70px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
  background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-light);
  border-radius:12px; padding:12px 18px; font-size:12.5px; line-height:1.6;
  z-index:300; max-width:90vw; text-align:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
}
#link-toast.show { opacity:1; pointer-events:auto; }

/* ── Bottom bar ── */
#bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg-bar); border-top:1px solid var(--border);
  padding:6px 10px calc(6px + env(safe-area-inset-bottom)); display:flex; gap:5px; align-items:center;
  z-index:100; justify-content:center;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  padding-left:calc(10px + env(safe-area-inset-left));
  padding-right:calc(10px + env(safe-area-inset-right));
}
#level-group {
  display:flex; gap:0; border:1px solid var(--border-light); border-radius:8px; overflow:hidden;
}
#level-group button {
  background:var(--bg-button); color:var(--text-muted); border:none; border-right:1px solid var(--border-light);
  padding:8px 12px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:600;
  transition:all .15s; white-space:nowrap;
}
#level-group button:last-child { border-right:none; }
#level-group button.active { background:var(--accent); color:#fff; }
#bottom-bar button {
  background:var(--bg-button); color:var(--text-primary); border:1px solid var(--border-light);
  border-radius:8px; padding:8px 11px; font-size:11.5px; cursor:pointer;
  white-space:nowrap; font-family:inherit; font-weight:600;
  transition:all .15s;
}
#bottom-bar button.active { background:var(--accent); border-color:var(--accent-light); color:#fff; }
#bottom-bar button:active { transform:scale(0.95); }
#btn-search-toggle { font-size:14px; padding:8px 10px; }
#search-input:focus { border-color:var(--accent-light); outline:2px solid var(--accent-light); outline-offset:2px; }
#bottom-bar button:focus-visible { outline:2px solid var(--accent-light); outline-offset:2px; }

/* ── Bottom sheet ── */
#sheet-overlay {
  position:fixed; inset:0; z-index:200;
  display:none; pointer-events:none;
}
#sheet-overlay.show { display:block; }
#bottom-sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--bg-card); border-top-left-radius:16px; border-top-right-radius:16px;
  padding:20px 18px calc(34px + env(safe-area-inset-bottom)); z-index:210;
  transform:translateY(100%); transition:transform .25s ease;
  max-height:90vh; overflow-y:auto;
  will-change:transform;
}
#bottom-sheet.show { transform:translateY(0); }
#bottom-sheet.snap-30 { max-height:30vh; }
#bottom-sheet.snap-50 { max-height:50vh; }
#bottom-sheet.snap-90 { max-height:90vh; }
#sheet-handle { width:48px; height:8px; background:#555; border-radius:4px; margin:0 auto 14px; cursor:grab; touch-action:none; padding:10px 0; background-clip:content-box; }
#sheet-title { font-size:18px; font-weight:700; margin-bottom:4px; }
#sheet-sub { font-size:13px; color:var(--text-muted); margin-bottom:10px; }
#sheet-desc { font-size:13px; color:var(--text-secondary); margin-bottom:12px; line-height:1.5; }
.sheet-btn-row { display:flex; gap:8px; margin-bottom:12px; }
.sim-btn {
  flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:600;
  border:none; cursor:pointer; font-family:inherit;
}
.sim-btn.up   { background:#16a34a22; color:#22c55e; border:1px solid #16a34a55; }
.sim-btn.down { background:#dc262622; color:#f87171; border:1px solid #dc262655; }
.sim-btn:active { transform:scale(0.97); }
#sheet-interp { font-size:12.5px; color:var(--text-secondary); line-height:1.6; }

/* ── Category filter chips ── */
.cat-chip {
  background:var(--bg-button); color:#aaa; border:1px solid var(--border-light);
  border-radius:14px; padding:5px 10px; font-size:11px; cursor:pointer;
  white-space:nowrap; font-family:inherit; transition:all .15s;
}
.cat-chip.active { color:#fff; }
#cat-chips { display:flex; gap:4px; flex-wrap:wrap; }

/* ── Legend ── */
#legend-box {
  position:fixed; top:10px; right:10px; z-index:90;
  background:#16161ecc; border:1px solid #2a2a3a; border-radius:10px;
  padding:8px 10px; font-size:11px; color:#94a3b8;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  user-select:none; max-width:150px;
}
#legend-toggle {
  background:none; border:none; color:#94a3b8; cursor:pointer;
  font-size:11px; float:right; padding:0 2px; font-family:inherit;
}
#legend-items { margin-top:4px; }
.legend-row { display:flex; align-items:center; gap:6px; padding:2px 0; }
.legend-line {
  width:22px; height:0; border-top:2px solid; flex-shrink:0;
}
.legend-shape {
  width:12px; height:12px; flex-shrink:0; border:1.5px solid #94a3b8;
}
.legend-shape.circle { border-radius:50%; }
.legend-shape.rect   { border-radius:2px; }

/* ── Onboarding ── */
#onboard-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
}
#onboard-card {
  background:#1e1e2e; border:1px solid #2a2a3a; border-radius:16px;
  padding:28px 24px 20px; max-width:340px; width:90%; color:#e2e8f0;
  text-align:center;
}
#onboard-card h3 { font-size:15px; margin-bottom:14px; font-weight:700; }
#onboard-step { font-size:13px; line-height:1.7; color:#cbd5e1; min-height:48px; }
#onboard-dots { margin:16px 0 14px; display:flex; justify-content:center; gap:6px; }
.ob-dot {
  width:7px; height:7px; border-radius:50%; background:#3a3a5a;
}
.ob-dot.active { background:#6366f1; }
#onboard-btns { display:flex; gap:8px; justify-content:center; }
#onboard-btns button {
  padding:8px 18px; border-radius:8px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:inherit; border:1px solid #3a3a5a;
  transition:all .15s;
}
#ob-skip { background:transparent; color:#64748b; }
#ob-next { background:#4f46e5; color:#fff; border-color:#6366f1; }

/* ── Responsive: Medium screens ── */
@media (max-width: 768px) {
  #bottom-bar { padding:6px 8px; gap:5px; }
  #bottom-bar button { padding:8px 11px; font-size:11.5px; min-height:44px; min-width:44px; }
  #search-input { width:80px; font-size:11.5px; padding:8px 8px; min-height:44px; }
  #legend-box { font-size:10.5px; padding:6px 8px; max-width:150px; }
  .legend-row { font-size:10.5px; }
  .cat-chip { padding:6px 10px; font-size:10.5px; min-height:44px; display:inline-flex; align-items:center; }
}

/* ── Responsive: Large phones ── */
@media (max-width: 600px) {
  #bottom-bar { gap:4px; }
  #bottom-bar button { padding:7px 9px; font-size:11px; min-height:44px; }
  #level-group button { padding:7px 10px; font-size:11px; }
  #legend-box { font-size:10px; max-width:130px; }
}

/* ── Responsive: Small screens ── */
@media (max-width: 480px) {
  #bottom-bar { padding:5px 6px calc(5px + env(safe-area-inset-bottom)); gap:3px; }
  #bottom-bar button { padding:6px 8px; font-size:10.5px; min-height:44px; }
  #level-group button { padding:6px 8px; font-size:10.5px; }
  #legend-box { font-size:9.5px; padding:5px 7px; max-width:120px; }
  #bottom-sheet { padding:16px 14px 28px; }
  #sheet-title { font-size:16px; }
  #sheet-desc { font-size:12px; }
}

/* ── Responsive: Very small phones ── */
@media (max-width: 360px) {
  #bottom-bar { padding:4px 4px; gap:2px; }
  #bottom-bar button { padding:5px 6px; font-size:9.5px; min-height:40px; }
  #level-group button { padding:5px 7px; font-size:9.5px; }
  #legend-box { font-size:9px; max-width:110px; }
  #bottom-sheet { padding:12px 10px 24px; }
}

/* ── Responsive: Landscape orientation ── */
@media (orientation: landscape) and (max-height: 500px) {
  #bottom-bar { padding:4px 8px; }
  #bottom-bar button { padding:5px 10px; font-size:11px; min-height:36px; }
  #search-input { min-height:36px; }
  .cat-chip { min-height:36px; }
  #bottom-sheet { max-height:80vh; }
  #legend-box { top:6px; left:6px; max-width:120px; font-size:9px; }
  #disclaimer { display:none; }
}

/* ── Warning badges ── */
.threshold-badge {
  display:inline-block; padding:3px 8px; border-radius:4px;
  font-size:11px; font-weight:600; color:#fff; margin-right:4px;
}
</style>
</head>
<body>

<svg id="svg" role="img" aria-label="경제 지표 인과관계 네트워크 맵">
  <title>경제 지표 인과관계 맵 — 26개 지표 간 상승/하락 연쇄 효과를 시각화합니다</title>
</svg>

<!-- Data timestamp -->
<div id="data-timestamp" style="position:fixed;top:10px;left:10px;z-index:90;font-size:10px;color:#64748b;background:#16161ecc;padding:4px 8px;border-radius:6px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);"></div>

<!-- Regime badge -->
<div id="regime-badge" style="position:fixed;top:36px;left:10px;z-index:90;font-size:10px;padding:4px 10px;border-radius:6px;background:#16161ecc;border:1px solid #2a2a3a;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#94a3b8;cursor:pointer;" title="현재 경기 국면 (PMI, 금리차, VIX 기반 자동 판별)"></div>

<!-- Loading spinner -->
<div id="loading-spinner" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;">
  <div style="text-align:center;color:#94a3b8;">
    <div style="width:40px;height:40px;border:3px solid #3a3a5a;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <div style="font-size:13px;">데이터 로딩 중...</div>
  </div>
</div>
<style>@keyframes spin { to { transform:rotate(360deg); } }</style>

<!-- Disclaimer -->
<div id="disclaimer" style="position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;font-size:9px;color:#64748b;z-index:99;pointer-events:none;padding:0 10px;">본 서비스는 투자자문이 아니며, 제공된 정보는 참고용입니다. 투자 결정에 따른 책임은 이용자 본인에게 있습니다.</div>

<!-- Bottom bar -->
<nav id="bottom-bar" aria-label="맵 제어 도구모음">
  <div id="level-group">
    <button id="btn-lv1" class="active" data-lv="1">핵심</button>
    <button id="btn-lv2" data-lv="2">기본</button>
    <button id="btn-lv3" data-lv="3">심화</button>
  </div>
  <button id="btn-search-toggle" aria-label="검색">🔍</button>
  <button id="btn-edit" aria-pressed="false">수정</button>
  <button id="btn-reset" style="display:none;">초기화</button>
  <button id="btn-multi-sim" title="복합 시나리오">복합</button>
  <button id="btn-export" title="현재 맵을 PNG로 저장">PNG</button>
  <button id="btn-dashboard">대시보드</button>
</nav>
<!-- 검색 오버레이 (토글) -->
<div id="search-bar" style="display:none;position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;padding:8px 12px;background:var(--bg-bar);z-index:110;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--border);">
  <input id="search-input" placeholder="지표 이름 검색..." aria-label="경제 지표 검색" style="width:100%;background:var(--bg-surface);color:var(--text-primary);border:1px solid var(--border-light);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;font-family:inherit;" />
</div>
<span id="cat-chips" style="display:none;"></span>

<!-- Dashboard panel -->
<div id="dashboard-panel" style="display:none;position:fixed;inset:0;z-index:180;background:var(--bg-primary);overflow-y:auto;padding:16px 12px calc(60px + env(safe-area-inset-bottom));">

<!-- Multi-sim panel -->
<div id="multi-sim-panel" style="display:none;position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;background:#1e1e2eee;border-top:1px solid #3a3a5a;padding:12px 16px;z-index:150;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);">
  <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#e2e8f0;">복합 시나리오: 지표를 선택하고 방향을 지정하세요</div>
  <div id="multi-sim-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;max-height:30vh;overflow-y:auto;"></div>
  <div style="display:flex;gap:8px;">
    <button id="btn-multi-run" style="flex:1;padding:8px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">시뮬레이션 실행</button>
    <button id="btn-multi-cancel" style="padding:8px 14px;background:#23233a;color:#e2e8f0;border:1px solid #3a3a5a;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">취소</button>
  </div>
</div>

<!-- Bottom sheet overlay -->
<div id="sheet-overlay"></div>
<div id="bottom-sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-title"></div>
  <div id="sheet-sub"></div>
  <div id="sheet-desc"></div>
  <div class="sheet-btn-row">
    <button class="sim-btn up" id="btn-sim-up">오르면?</button>
    <button class="sim-btn down" id="btn-sim-down">내리면?</button>
    <button id="btn-portfolio" style="padding:10px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #6366f155;background:#6366f122;color:#a78bfa;cursor:pointer;font-family:inherit;">포트폴리오</button>
  </div>
  <div id="sheet-spark"></div>
  <div id="sheet-interp"></div>
</div>

<!-- Legend -->
<div id="legend-box">
  <span style="font-weight:700;color:#cbd5e1;">범례</span>

  <div id="legend-items">

    <div class="legend-row"><span class="legend-line" style="border-color:#94a3b8;border-top-style:dashed;"></span>반비례 관계</div>
    <div class="legend-row"><span class="legend-line" style="border-color:#94a3b8;"></span>비례 관계</div>
    <div class="legend-row"><span class="legend-line" style="border-color:#555;"></span>데이터 없음</div>
    <div class="legend-row"><span class="legend-shape circle"></span>자산</div>

<!-- Link toast -->
<div id="link-toast"></div>

<!-- Onboarding -->

  <div id="onboard-card">

    <div id="onboard-dots"></div>
    <div id="onboard-btns">
      <button id="ob-skip">건너뛰기</button>
      <button id="ob-next">다음</button>
    </div>
  </div>
</div>

<script>
/* ── Service Worker 해제 (캐시 문제 방지) ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}

/* ================================================================
   Economic Map v4 — Complete Rewrite
   ================================================================ */

/* ── Constants ── */
const CAT_ORDER = ['자산','매크로 지표','시장 지표','리스크'];
const BOX_W      = 340;
const SP_X_IND   = 105, SP_Y_IND = 86;
const SP_X_AST   = 105, SP_Y_AST = 108;
const MAX_COLS   = 3;
const PAD_X      = 16,  PAD_TOP = 34, PAD_BOT = 28, BOX_GAP = 16;
const NODE_R     = 22,  ASSET_EXTRA = 12;
const RECT_W     = 88,  RECT_H  = 48;
const BAR_H      = 52;

/* ── State ── */
let DATA, VALS, nodeMap = {};
let boxes = [];
let currentLevel = 1;
let editMode     = false;
let selectedNode  = null;
let catFilter     = null;        // null = show all

let H = window.innerHeight;

/* ── D3 setup ── */
const svg   = d3.select('#svg');
/* defs for arrowheads */
const defs  = svg.append('defs');
['#16a34a','#dc2626','#ca8a04','#555'].forEach(c => {
  defs.append('marker')
    .attr('id', 'arrow-' + c.replace('#',''))
    .attr('viewBox','0 0 10 10')
    .attr('refX', 10).attr('refY', 5)
    .attr('markerWidth', 5).attr('markerHeight', 5)

/* ── Zoom ── */
let currentZoom = 1;
function onZoom(e) {
  gRoot.attr('transform', e.transform);
  const z = e.transform.k;
  if (Math.abs(z - currentZoom) < 0.05) return;
  currentZoom = z;
  /* 화살표 줌 역보정: 화면상 ~6px 유지 */
  const mSize = Math.max(4, Math.min(8, 6 / z));
  defs.selectAll('marker').attr('markerWidth', mSize).attr('markerHeight', mSize);
  /* 링크: 줌아웃 시 opacity 보강 */
  gLinks.selectAll('path.link-line').style('opacity', z < 0.6 ? 0.7 : z < 1.0 ? 0.5 : 0.4);
  /* 링크 히트 영역: 줌아웃 시 확대 */
  gLinks.selectAll('path.link-hit').attr('stroke-width', Math.max(14, 14 / z));
  /* 프로그레시브 디테일: 줌 < 0.4이면 sub/value 숨김 */
  gNodes.selectAll('.node-sub, .node-value').attr('display', z < 0.4 ? 'none' : null);
  /* 텍스트 최소 가독성: 줌 < 0.5일 때 역보정 */
  if (z < 0.5) {
    gNodes.selectAll('.node-label').attr('font-size', (11 / z) + 'px');
  } else {
    gNodes.selectAll('g.node-g').each(function(d) {
      d3.select(this).select('.node-label').attr('font-size', (13 * levelScale(d.level)) + 'px');
    });
  }
}
const zoomBehavior = d3.zoom()
  .scaleExtent([0.2, 4])
  .filter(e => {
    if (editMode && e.type === 'mousedown') return false;
    return true;
  })
  .on('zoom', onZoom);
svg.call(zoomBehavior);

/* ================================================================
   POSITION PERSISTENCE (localStorage)
   ================================================================ */
const POS_KEY = 'economic-map-positions';

function savePositions() {
  const pos = {};
  DATA.nodes.forEach(n => {
    pos[n.id] = { x: n._fixedX, y: n._fixedY };
  });
  localStorage.setItem(POS_KEY, JSON.stringify(pos));
}

function loadPositions() {
  const raw = localStorage.getItem(POS_KEY);
  if (!raw) return false;
  try {
    const pos = JSON.parse(raw);
    let applied = false;
    DATA.nodes.forEach(n => {
      if (pos[n.id]) {
        n._fixedX = n.cx = pos[n.id].x;
        n._fixedY = n.cy = pos[n.id].y;
        applied = true;
      }
    });
    return applied;
  } catch(e) { return false; }
}

function resetPositions() {
  localStorage.removeItem(POS_KEY);
  layoutDone = false;
  computeLayout();
  renderAll();
  fitView(400);
}

/* ================================================================
   REGIME DETECTION — 경기 국면 자동 탐지
   ================================================================ */
function detectRegime() {
  const badge = document.getElementById('regime-badge');
  if (!badge) return;

  const pmi = nodeMap['us_pmi']?._val;
  const spread = nodeMap['us_spread']?._val;
  const vix = nodeMap['us_vix']?._val;
  const nfci = nodeMap['us_nfci']?._val;

  let regime = '판별 불가';
  let color = '#64748b';
  let emoji = '';

  if (pmi == null && spread == null) {
    badge.textContent = '';
    return;
  }

  /* 위기 (VIX>=30 OR spread<-0.5 AND PMI<45) */
  if ((vix != null && vix >= 30) || (spread != null && spread < -0.5 && pmi != null && pmi < 45)) {
    regime = '위기/침체'; color = '#dc2626'; emoji = '\uD83D\uDFE5';
  }
  /* 둔화 (PMI<50 OR spread<0 OR NFCI>0) */
  else if ((pmi != null && pmi < 50) || (spread != null && spread < 0) || (nfci != null && nfci > 0)) {
    regime = '둔화/경고'; color = '#f59e0b'; emoji = '\uD83D\uDFE7';
  }
  /* 과열 (PMI>55 AND VIX<15) */
  else if (pmi != null && pmi > 55 && vix != null && vix < 15) {
    regime = '과열 주의'; color = '#f97316'; emoji = '\uD83D\uDFE0';
  }
  /* 확장 (PMI>=50 AND spread>0) */
  else {
    regime = '확장'; color = '#22c55e'; emoji = '\uD83D\uDFE2';
  }

  badge.style.color = color;
  badge.style.borderColor = color + '55';
  badge.textContent = emoji + ' ' + regime;
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  DATA.nodes.forEach(n => { n.dx = 0; n.dy = 0; });
  nodeMap = {};
  DATA.nodes.forEach(n => nodeMap[n.id] = n);

  attachValues();
  computeLayout();
  /* restore saved positions after initial layout */
  loadPositions();
  /* re-hide nodes beyond current level after restore */
  DATA.nodes.forEach(n => {
    if (n.level > currentLevel) { n.cx = -9999; n.cy = -9999; }
  });
  renderAll();
  fitView(0);
  bindEvents();
  renderCatChips();

  /* URL 파라미터 처리: ?focus=nodeId&sim=up|down&lv=1|2|3 */
  const params = new URLSearchParams(location.search);
  if (params.has('lv')) {
    const lv = parseInt(params.get('lv'));
    if (lv >= 1 && lv <= 3) applyLevel(lv);
  }
  if (params.has('focus')) {
    const focusId = params.get('focus');
    const focusNode = nodeMap[focusId];
    if (focusNode) {
      setTimeout(() => {
        openSheet(focusNode);
        const simDir = params.get('sim');
        if (simDir === 'up' || simDir === 'down') {
          runSim(focusNode, simDir);
        }
      }, 300);
    }
  }

  detectRegime();
}

/* ================================================================
   FRED values → nodes
   ================================================================ */
function attachValues() {
  if (!VALS || !VALS.data) return;
  DATA.nodes.forEach(n => {
    const key = n.dataSource && n.dataSource.fred;
    if (!key) { n._val = null; n._dir = null; n._pct = null; return; }
    const s = VALS.data[key];
    if (!s || s.length < 2) { n._val = null; n._dir = null; n._pct = null; return; }
    const cur  = parseFloat(s[0].value);
    const prev = parseFloat(s[1].value);
    n._val = cur;
    n._dir = cur > prev ? 'up' : cur < prev ? 'down' : 'flat';
    /* 모든 값을 변화율(%)로 통일 */
    if (n.unit === 'YoY%') {
      n._pct = cur; /* 이미 YoY% 변환된 값 */
    } else if (prev !== 0) {
      n._pct = ((cur - prev) / Math.abs(prev)) * 100;
    } else {
      n._pct = null;
    }
  });
}

/* ================================================================
   LAYOUT — asset-centered, fixed positions
   최초 1회 계산 후 고정. 레벨 변경은 보이기/숨기기만.
   ================================================================ */
let layoutDone = false;

function computeLayout() {
  boxes = [];

  if (layoutDone) {
    // 레벨 변경 시: 위치 그대로, 보이기/숨기기만
    DATA.nodes.forEach(n => {
      if (n.level > currentLevel) { n.cx = -9999; n.cy = -9999; }
      else { n.cx = n._fixedX; n.cy = n._fixedY; }
    });
    return;
  }

  const allAssets = DATA.nodes.filter(n => n.isAsset);
  const allIndicators = DATA.nodes.filter(n => !n.isAsset);

  // 1) 자산 세로 배치 (중앙)
  const centerX = 180;
  const assetStartY = 70;
  const assetGap = 150;

  allAssets.forEach((n, i) => {
    n._fixedX = n.cx = centerX;
    n._fixedY = n.cy = assetStartY + i * assetGap;
  });

  // 2) 각 지표의 연결 자산 파악
  allIndicators.forEach(ind => {
    const conn = [];
    DATA.links.forEach(l => {
      const src = typeof l.source === 'object' ? l.source.id : l.source;
      const tgt = typeof l.target === 'object' ? l.target.id : l.target;
      if (src === ind.id) { const a = allAssets.find(n=>n.id===tgt); if(a) conn.push(a); }
      if (tgt === ind.id) { const a = allAssets.find(n=>n.id===src); if(a) conn.push(a); }
    });
    ind._connAssets = conn;
  });

  // 3) 고정 좌표 배치: 좌우 교대, y는 연결 자산 평균
  // 좌측/우측 각각 y좌표 목록 관리
  const leftYs = [], rightYs = [];
  const xLeft = centerX - 170, xRight = centerX + 170;
  const minGap = 76; // 최소 세로 간격

  // 연결 자산 수 많은 순으로 먼저 배치 (좋은 자리 선점)
  const sorted = [...allIndicators].sort((a,b) => b._connAssets.length - a._connAssets.length);

  sorted.forEach(ind => {
    // 목표 y
    let targetY;
    if (ind._connAssets.length > 0) {
      targetY = ind._connAssets.reduce((s,a) => s + a._fixedY, 0) / ind._connAssets.length;
    } else {
      targetY = assetStartY + allAssets.length * assetGap / 2;
    }

    // 좌우 중 비어있는 쪽 선택
    const goLeft = leftYs.length <= rightYs.length;
    const slots = goLeft ? leftYs : rightYs;
    const xPos = goLeft ? xLeft : xRight;

    // 겹치지 않는 y 찾기: targetY에서 위아래로 탐색
    let yPos = targetY;
    let dir = 1, step = 0;
    for (let i = 0; i < 40; i++) {
      const conflict = slots.some(s => Math.abs(s - yPos) < minGap);
      if (!conflict) break;
      step++;
      yPos = targetY + dir * step * (minGap / 2);
      dir = -dir; // 위아래 번갈아
      if (dir > 0) step++; // 한 쪽 더 멀리
    }
    slots.push(yPos);

    ind._fixedX = ind.cx = xPos;
    ind._fixedY = ind.cy = yPos;
  });

  // 숨겨진 노드
  DATA.nodes.forEach(n => {
    if (n.level > currentLevel) { n.cx = -9999; n.cy = -9999; }
  });

  layoutDone = true;
}

   RENDER — full draw
   ================================================================ */

/* ── Links ── */
// 노드 경계점 계산: 원(자산)은 원 경계, 사각형(지표)은 사각형 경계
function edgePoint(n, tx, ty, margin) {
  const dx = tx - n.cx, dy = ty - n.cy;
  if (n.isAsset) {
    // 원: 방향 벡터로 경계점
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const r = NODE_R + ASSET_EXTRA + margin;
    return { x: n.cx + dx/dist * r, y: n.cy + dy/dist * r };
  } else {
    // 사각형: 변과의 교차점
    const hw = RECT_W/2 + margin, hh = RECT_H/2 + margin;
    if (dx === 0 && dy === 0) return { x: n.cx + hw, y: n.cy };
    const sx = hw / (Math.abs(dx) || 1), sy = hh / (Math.abs(dy) || 1);
    const s = Math.min(sx, sy);
    return { x: n.cx + dx * s, y: n.cy + dy * s };
  }
}

// 사각형의 특정 변에서 나가는 점 (방향: 'left','right','top','bottom')
function rectSide(n, side, margin) {
  const hw = RECT_W/2 + margin, hh = RECT_H/2 + margin;
  if (side === 'left')   return { x: n.cx - hw, y: n.cy };
  if (side === 'right')  return { x: n.cx + hw, y: n.cy };
  if (side === 'top')    return { x: n.cx, y: n.cy - hh };
  return { x: n.cx, y: n.cy + hh };
}

/* ── 고정 5포트 시스템 — 사각형 각 변에 5개 고정 연결점 ── */
const PORTS_PER_SIDE = 5;
let portCache = {};

function addConn(nodeConns, nodeId, side, link, other, margin) {
  if (!nodeConns[nodeId]) nodeConns[nodeId] = {};
  if (!nodeConns[nodeId][side]) nodeConns[nodeId][side] = [];
  nodeConns[nodeId][side].push({ link, other, margin });
}

function computePorts() {
  portCache = {};
  const nodeConns = {};

  DATA.links.forEach(link => {
    const s = nodeMap[link.source], t = nodeMap[link.target];
    if (!s || !t || !linkVisible(link)) return;

    const bothIndicators = !s.isAsset && !t.isAsset;

    if (!bothIndicators) {
      // 지표↔자산: 방향 기반 변 결정
      if (!s.isAsset) addConn(nodeConns, s.id, rectExitSide(s, t), link, t, 2);
      if (!t.isAsset) addConn(nodeConns, t.id, rectExitSide(t, s), link, s, 6);
    } else {
      // 지표↔지표: linkPath 라우팅과 동일한 변 결정
      const sameSide = (s.cx < 180) === (t.cx < 180);
      if (sameSide) {
        const outDir = s.cx < 180 ? 'left' : 'right';
        addConn(nodeConns, s.id, outDir, link, t, 2);
        addConn(nodeConns, t.id, outDir, link, s, 6);
      } else {
        const goUp = s.cy <= t.cy;
        const dir = goUp ? 'top' : 'bottom';
        addConn(nodeConns, s.id, dir, link, t, 2);
        addConn(nodeConns, t.id, dir, link, s, 6);
      }
    }
  });

  Object.keys(nodeConns).forEach(nodeId => {
    const n = nodeMap[nodeId];
    Object.entries(nodeConns[nodeId]).forEach(([side, items]) => {
      if (side === 'left' || side === 'right') {
        items.sort((a, b) => a.other.cy - b.other.cy);
      } else {
        items.sort((a, b) => a.other.cx - b.other.cx);
      }
      const portIndices = assignPorts(items.length, PORTS_PER_SIDE);
      items.forEach((c, i) => {
        const key = c.link.source + '|' + c.link.target + '|' + nodeId;
        portCache[key] = fixedPort(n, side, portIndices[i], c.margin);
      });
    });
  });
}

// N개 연결을 totalPorts개 슬롯에 가운데 정렬 배정
function assignPorts(count, totalPorts) {
  const start = Math.floor((totalPorts - count) / 2);
  return Array.from({ length: count }, (_, i) => start + i);
}

function rectExitSide(from, to) {
  const dx = to.cx - from.cx, dy = to.cy - from.cy;
  const hw = RECT_W / 2, hh = RECT_H / 2;
  if (dx === 0 && dy === 0) return 'right';
  const sx = hw / (Math.abs(dx) || 0.001);
  const sy = hh / (Math.abs(dy) || 0.001);
  if (sx <= sy) return dx >= 0 ? 'right' : 'left';
  return dy >= 0 ? 'bottom' : 'top';
}

// 고정 포트 좌표 계산: 변을 5등분한 위치
function fixedPort(n, side, portIdx, margin) {
  const hw = RECT_W / 2 + margin, hh = RECT_H / 2 + margin;
  const t = (portIdx + 1) / (PORTS_PER_SIDE + 1); // 균등 분할 (양 끝 여백 포함)
  if (side === 'left' || side === 'right') {
    const x = side === 'left' ? n.cx - hw : n.cx + hw;
    const y = n.cy - hh + t * 2 * hh;
    return { x, y };
  }
  const y = side === 'top' ? n.cy - hh : n.cy + hh;
  const x = n.cx - hw + t * 2 * hw;
  return { x, y };
}

function getPort(link, nodeId) {
  return portCache[link.source + '|' + link.target + '|' + nodeId];
}

let linkIndex = 0;

// 직선이 노드를 관통하는지 체크
function hitsNode(x1,y1,x2,y2, node, margin) {
  // 선분과 노드 중심의 거리 계산
  const dx=x2-x1, dy=y2-y1;
  const len2=dx*dx+dy*dy;
  if(len2===0) return false;
  let t=((node.cx-x1)*dx+(node.cy-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  const px=x1+t*dx, py=y1+t*dy;
  const dist=Math.sqrt((node.cx-px)**2+(node.cy-py)**2);
  const r=node.isAsset ? NODE_R+ASSET_EXTRA+margin : Math.max(RECT_W,RECT_H)/2+margin;
  return dist < r;
}

// 경로 위의 노드 찾기 (출발/도착 노드 제외)
function findBlockingNodes(s, t, margin) {
  const vis = DATA.nodes.filter(n => n.level <= currentLevel && n.id !== s.id && n.id !== t.id && n.cx > -999);
  return vis.filter(n => hitsNode(s.cx, s.cy, t.cx, t.cy, n, margin));
}

function linkPath(link) {
  const s = nodeMap[link.source], t = nodeMap[link.target];
  if (!s || !t) return 'M0,0';

  const bothIndicators = !s.isAsset && !t.isAsset;
  const centerX = s.isAsset ? s.cx : (t.isAsset ? t.cx : 180);

  if (!bothIndicators) {
    // 지표↔자산: 다른 노드 관통 여부 체크 (margin 넉넉하게)
    const blocking = findBlockingNodes(s, t, 25);
    // 사각형은 분산 포트, 원은 기존 edgePoint
    const p1 = getPort(link, s.id) || edgePoint(s, t.cx, t.cy, 2);
    const p2 = getPort(link, t.id) || edgePoint(t, s.cx, s.cy, 6);

    if (blocking.length === 0) {
      return `M${p1.x},${p1.y} L${p2.x},${p2.y}`;
    }

    // 관통 노드 있으면 곡선 우회 — 넉넉하게 돌아감
    const sLeft = s.cx < centerX;
    linkIndex++;
    const bendDir = ((sLeft ? 1 : -1) * ((linkIndex % 2) ? 1 : -1));
    const bendAmt = 60 + blocking.length * 30;
    const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
    const dx = p2.x-p1.x, dy = p2.y-p1.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    // 수직 방향으로 bend
    const cx = mx - (dy/dist) * bendAmt * bendDir;
    const cy = my + (dx/dist) * bendAmt * bendDir;
    return `M${p1.x},${p1.y} Q${cx},${cy} ${p2.x},${p2.y}`;
  }

  // 지표↔지표
  const sameSide = (s.cx < 180) === (t.cx < 180);

  if (sameSide) {
    const sLeft = s.cx < 180;
    const outDir = sLeft ? 'left' : 'right';
    linkIndex++;
    const baseOff = 25 + (linkIndex % 6) * 14;
    const outX = sLeft
      ? Math.min(s.cx, t.cx) - RECT_W/2 - baseOff
      : Math.max(s.cx, t.cx) + RECT_W/2 + baseOff;
    const p1 = getPort(link, s.id) || rectSide(s, outDir, 2);
    const p2 = getPort(link, t.id) || rectSide(t, outDir, 6);
    return `M${p1.x},${p1.y} L${outX},${p1.y} L${outX},${p2.y} L${p2.x},${p2.y}`;
  } else {
    // 반대 쪽: 위/아래 우회
    linkIndex++;
    const goUp = s.cy <= t.cy;
    const margin = 30 + (linkIndex % 4) * 18;
    const midY = goUp
      ? Math.min(s.cy, t.cy) - margin
      : Math.max(s.cy, t.cy) + margin;
    const p1 = getPort(link, s.id) || rectSide(s, goUp ? 'top' : 'bottom', 2);
    const p2 = getPort(link, t.id) || rectSide(t, goUp ? 'top' : 'bottom', 6);
    return `M${p1.x},${p1.y} L${p1.x},${midY} L${p2.x},${midY} L${p2.x},${p2.y}`;
  }
}

/* strength → stroke-width 매핑 */
function strengthWidth(s) {
  if (s <= 2) return 1;
  if (s === 3) return 1.6;
  if (s === 4) return 2.2;
  return 3; // 5
}

function renderLinks() {
  gLinks.selectAll('*').remove();
  linkIndex = 0;
  computePorts();

  DATA.links.forEach(link => {
    const s = nodeMap[link.source], t = nodeMap[link.target];
    if (!s || !t) return;
    const col = linkLiveColor(link);
    const isDash = link.type === '반비례';
    const sw = strengthWidth(link.strength || 3);
    const d = linkPath(link);
    const vis = linkVisible(link) ? null : 'none';

    /* 투명 히트 영역 (클릭 쉽도록 두꺼움) */
    gLinks.append('path')
      .datum(link)
      .attr('class','link-hit')
      .attr('d', d)
      .attr('display', vis)
      .on('click', function(e) { e.stopPropagation(); showLinkToast(link); });

    /* 실제 보이는 선 */
    gLinks.append('path')
      .datum(link)
      .attr('class','link-line')
      .attr('stroke', col)
      .style('--glow', col)
      .attr('fill', 'none')
      .attr('stroke-width', sw)
      .attr('stroke-dasharray', isDash ? '7,4' : null)
      .attr('marker-end', 'url(#arrow-' + col.replace('#','') + ')')
      .attr('d', d)
      .attr('display', vis)
      .style('pointer-events', 'none');
  });
}

// 실시간 영향 색상: 소스 지표의 변화 방향 + 관계 유형으로 결정
// 예: 기준금리↑ + 반비례 → 주식↓ → 빨강
// 예: 기준금리↑ + 비례 → 현금↑ → 초록
function linkLiveColor(l) {
  const s = nodeMap[l.source];
  const isBirye = l.type === '비례';

  // 데이터 없으면 영향 방향 알 수 없으므로 회색
  if (!s || !s._dir || s._dir === 'flat') return '#555';

  const srcUp = s._dir === 'up';
  const targetUp = srcUp === isBirye;
  return targetUp ? '#16a34a' : '#dc2626';
}

// 관계 유형 색상 (화살촉용)
function linkTypeColor(l) {
  if (l.type === '비례')   return '#16a34a';
  if (l.type === '반비례') return '#dc2626';
  return '#ca8a04';
}

function linkVisible(l) {
  const s = nodeMap[l.source], t = nodeMap[l.target];
  return s.level <= currentLevel && t.level <= currentLevel;
}

function updateLinkPositions(animate) {
  computePorts();
  const sel = gLinks.selectAll('path.link-line');
  const s = animate ? sel.transition().duration(400) : sel;
  s.attr('d', d => linkPath(d));
  sel.attr('display', d => linkVisible(d) ? null : 'none');

  const hitSel = gLinks.selectAll('path.link-hit');
  const h = animate ? hitSel.transition().duration(400) : hitSel;
  h.attr('d', d => linkPath(d));
  hitSel.attr('display', d => linkVisible(d) ? null : 'none');
}

/* ── Boxes ── */
function renderBoxes() {
  gBoxes.selectAll('*').remove();
  // 자산 중심 레이아웃에서는 카테고리 박스를 그리지 않음
  if (!boxes.length) return;

  boxes.forEach(box => {
    if (!box.visible) return;
    const g = gBoxes.append('g').datum(box);

    g.append('rect')
      .attr('class','cat-box')
      .attr('x', box.x).attr('y', box.y)
      .attr('width', box.w).attr('height', box.h)
      .attr('rx', 10)
      .attr('stroke', box.color);

    g.append('text')
      .attr('class','cat-label')
      .attr('x', box.x + 12).attr('y', box.y + 18)
      .text(box.name);

    /* box drag in edit mode */
    g.call(d3.drag()
      .filter(() => editMode)
      .on('drag', function(event) {
        const dx = event.dx, dy = event.dy;
        box.x += dx; box.y += dy;
        /* move contained nodes */
        DATA.nodes.filter(n => n.category === box.name && n.level <= currentLevel)
          .forEach(n => { n.cx += dx; n.cy += dy; });
        refreshPositions();
      })
    );
  });
}

function updateBoxPositions(animate) {
  const gs = gBoxes.selectAll('g').data(boxes.filter(b => b.visible), d => d.name);
  gs.each(function(box) {
    const g = d3.select(this);
    const r = animate ? g.select('rect').transition().duration(400) : g.select('rect');
    r.attr('x', box.x).attr('y', box.y)
     .attr('width', box.w).attr('height', box.h);
    const t = animate ? g.select('text').transition().duration(400) : g.select('text');
    t.attr('x', box.x + 12).attr('y', box.y + 18);
  });
}

/* ── Level-based scale factor ── */
function levelScale(level) {
  if (level === 1) return 1.2;
  if (level === 2) return 1.0;
  return 0.85;
}

/* ── Nodes ── */
function renderNodes() {
  gNodes.selectAll('*').remove();

  DATA.nodes.forEach((node, idx) => {
    const sc = levelScale(node.level);
    const g = gNodes.append('g')
      .datum(node)
      .attr('class','node-g')
      .attr('transform', `translate(${node.cx},${node.cy})`)
      .attr('display', node.level <= currentLevel ? null : 'none')
      .style('opacity', 0);

    /* fade-in animation with stagger */
    g.transition().delay(idx * 15).duration(300).style('opacity', 1);

    if (node.isAsset) {
      const r = (NODE_R + ASSET_EXTRA) * sc;
      /* big circle */
      g.append('circle')
        .attr('class','node-circle')
        .attr('r', r)
        .attr('fill', nodeFill(node))
        .attr('stroke', nodeStroke(node));

      g.append('text').attr('class','node-label')
        .attr('y', 1)
        .attr('font-size', (13 * sc) + 'px')
        .text(node.label);

      g.append('text').attr('class','node-sub')
        .attr('y', r + 15)
        .attr('font-size', (9 * sc) + 'px')
        .text(node.sub);

      g.append('text').attr('class','node-value')
        .attr('y', r + 27)
        .text(valueText(node))
        .attr('fill', valueColor(node));

    } else {
      const rw = RECT_W * sc, rh = RECT_H * sc;
      /* rounded rect */
      g.append('rect')
        .attr('class','node-rect')
        .attr('x', -rw/2).attr('y', -rh/2)
        .attr('width', rw).attr('height', rh)
        .attr('rx', 8)
        .attr('fill', nodeFill(node))
        .attr('stroke', nodeStroke(node));

      g.append('text').attr('class','node-label')
        .attr('y', -4)
        .attr('font-size', (13 * sc) + 'px')
        .text(node.label);

      g.append('text').attr('class','node-sub')
        .attr('y', 12)
        .attr('font-size', (10 * sc) + 'px')
        .text(node.sub);

      g.append('text').attr('class','node-value')
        .attr('y', rh/2 + 14)
        .text(valueText(node))
        .attr('fill', valueColor(node));
    }

    /* 탭 vs 드래그 구분: 이동 < 8px이면 탭, 아니면 패닝 */
    let ptrStartX = 0, ptrStartY = 0, wasDrag = false, longPressTimer = null;

    g.on('pointerdown', function(e) {
      ptrStartX = e.clientX;
      ptrStartY = e.clientY;
      wasDrag = false;
      if (!editMode && e.pointerType !== 'mouse') {
        longPressTimer = setTimeout(() => {
          openSheet(node);
          longPressTimer = null;
        }, 300);
      }
    });
    g.on('pointermove', function(e) {
      const dx = e.clientX - ptrStartX, dy = e.clientY - ptrStartY;
      if (dx * dx + dy * dy > 64) { // 8px threshold
        wasDrag = true;
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      }
    });
    g.on('pointerup pointercancel', function() {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    });

    g.on('click', function(e) {
      if (editMode) return;
      if (wasDrag) { wasDrag = false; return; } // 드래그였으면 무시
      e.stopPropagation();
      /* 탭 피드백 */
      d3.select(this).transition().duration(80).attr('transform', `translate(${node.cx},${node.cy}) scale(1.08)`)
        .transition().duration(80).attr('transform', `translate(${node.cx},${node.cy}) scale(1)`);
      if ('vibrate' in navigator) navigator.vibrate(10);
      if (selectedNode === node) {
        openSheet(node);
      } else {
        selectedNode = node;
        hoverActive = false;
        highlightNode(node);
      }
    });

    /* 키보드 접근성 — 데스크톱만 tabindex 부여 */
    if (!('ontouchstart' in window)) {
      g.attr('tabindex', 0)
        .attr('role', 'button')
        .attr('aria-label', node.label + ' - ' + node.sub);
      g.on('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openSheet(node);
        }
      });
    }

    /* drag in edit mode — 자유 드래그 (박스 경계 없음) */
    g.call(d3.drag()
      .filter(() => editMode)
      .on('start', function() {
        d3.select(this).raise();
      })
      .on('drag', function(event) {
        node.cx += event.dx;
        node.cy += event.dy;
        node._fixedX = node.cx;
        node._fixedY = node.cy;
        d3.select(this).attr('transform', `translate(${node.cx},${node.cy})`);
        updateLinkPositions(false);
      })
      .on('end', function() {
        savePositions();
      })
    );
  });
}

function refreshPositions() {
  gNodes.selectAll('g.node-g')
    .attr('transform', d => `translate(${d.cx},${d.cy})`);
  gBoxes.selectAll('g').each(function(box) {
    d3.select(this).select('rect')
      .attr('x', box.x).attr('y', box.y)
      .attr('width', box.w).attr('height', box.h);
    d3.select(this).select('text')
      .attr('x', box.x + 12).attr('y', box.y + 18);
  });
  updateLinkPositions(false);
}

/* ── Node appearance helpers ── */
function nodeFill(n) {
  if (!n._dir || n._dir === 'flat') return '#2a2a3a';
  return n._dir === 'up' ? '#16a34a1a' : '#dc26261a';
}
function nodeStroke(n) {
  if (!n._dir || n._dir === 'flat') return '#555';
  return n._dir === 'up' ? '#16a34a' : '#dc2626';
}
function valueColor(n) {
  if (!n._dir || n._dir === 'flat') return '#555';
  return n._dir === 'up' ? '#16a34a' : '#dc2626';
}
function valueText(n) {
  if (n._pct == null) return '';
  const arrow = n._dir === 'up' ? '\u25B2' : n._dir === 'down' ? '\u25BC' : '';
  const sign = n._pct > 0 ? '+' : '';
  return sign + n._pct.toFixed(1) + '% ' + arrow;
}

/* ================================================================
   FIT VIEW
   ================================================================ */
function fitView(dur) {
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - BAR_H;

  const visNodes = DATA.nodes.filter(n => n.level <= currentLevel);
  if (!visNodes.length) return;

  const isMobile = svgW < 600;
  const pad = isMobile ? 25 : 50;
  const minX = Math.min(...visNodes.map(n => n.cx)) - pad - (isMobile ? 25 : 50);
  const minY = Math.min(...visNodes.map(n => n.cy)) - pad;
  const maxX = Math.max(...visNodes.map(n => n.cx)) + pad + (isMobile ? 25 : 50);
  const maxY = Math.max(...visNodes.map(n => n.cy)) + pad + (isMobile ? 25 : 50);

  const cw = maxX - minX, ch = maxY - minY;
  if (cw <= 0 || ch <= 0) return;

  const scale = Math.min(svgW / cw, svgH / ch, 2.0);
  const tx = (svgW - cw * scale) / 2 - minX * scale;
  const ty = (svgH - ch * scale) / 2 - minY * scale;
  const t = d3.zoomIdentity.translate(tx, ty).scale(scale);

  if (dur > 0) svg.transition().duration(dur).call(zoomBehavior.transform, t);
  else         svg.call(zoomBehavior.transform, t);
}

/* ================================================================
   APPLY LEVEL (핵심 함수)
   ================================================================ */
function applyLevel(lv) {
  currentLevel = lv;

  /* reset drag offsets */
  DATA.nodes.forEach(n => { n.dx = 0; n.dy = 0; });

  /* 1. recompute layout: visible nodes → box heights → stack y */
  computeLayout();

  /* 2. re-render everything (simple & correct) */
  renderAll();

  /* 3. fit view with animation */
  fitView(400);

  /* 4. update button UI */
  document.querySelectorAll('#bottom-bar button[data-lv]').forEach(b => {
    b.classList.toggle('active', +b.dataset.lv === lv);
  });

  /* close sheet if open */
  closeSheet();
}

/* ================================================================
   BOTTOM SHEET
   ================================================================ */
function openSheet(node) {
  selectedNode = node;
  hoverActive = false;
  highlightNode(node);

  document.getElementById('sheet-title').textContent = node.label;
  document.getElementById('sheet-sub').textContent = node.sub + (node._pct != null ? '  |  ' + valueText(node) : '');
  document.getElementById('sheet-desc').textContent = node.description || '';

  /* 임계값 경고 배지 */
  let warningEl = document.getElementById('sheet-warning');
  if (!warningEl) {
    warningEl = document.createElement('div');
    warningEl.id = 'sheet-warning';
    warningEl.style.cssText = 'margin-bottom:10px;';
    document.getElementById('sheet-desc').after(warningEl);
  }
  warningEl.textContent = '';

  const thresholds = {
    'us_vix': [
      { check: v => v >= 30, label: '공포 단계', color: '#dc2626' },
      { check: v => v >= 20 && v < 30, label: '불안', color: '#f59e0b' },
      { check: v => v < 12, label: '안일함 경고', color: '#f59e0b' },
    ],
    'us_hy': [
      { check: v => v >= 800, label: '위기 수준', color: '#dc2626' },
      { check: v => v >= 500, label: '스트레스', color: '#f59e0b' },
    ],
    'us_spread': [
      { check: v => v < 0, label: '침체 경고 (역전)', color: '#dc2626' },
    ],
    'us_cpi': [
      { check: v => v > 4, label: '고인플레', color: '#dc2626' },
      { check: v => v > 2.5, label: '인플레 주의', color: '#f59e0b' },
    ],
    'us_pce': [
      { check: v => v > 3, label: '연준 타겟 대폭 상회', color: '#dc2626' },
      { check: v => v > 2, label: '타겟 상회', color: '#f59e0b' },
    ],
    'us_unemployment': [
      { check: v => v > 5, label: '고실업', color: '#dc2626' },
    ],
    'us_nfci': [
      { check: v => v > 0, label: '금융 긴축', color: '#f59e0b' },
    ],
  };

  if (node._val != null && thresholds[node.id]) {
    const checks = thresholds[node.id];
    for (const t of checks) {
      if (t.check(node._val)) {
        const badge = document.createElement('span');
        badge.style.cssText = 'display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;color:#fff;background:' + t.color + ';';
        badge.textContent = t.label;
        warningEl.appendChild(badge);
        break; // first matching threshold only
      }
    }
  }

  document.getElementById('sheet-interp').textContent = '';

  /* FRED 출처 링크 */
  let sourceEl = document.getElementById('sheet-source');
  if (!sourceEl) {
    sourceEl = document.createElement('div');
    sourceEl.id = 'sheet-source';
    document.getElementById('bottom-sheet').appendChild(sourceEl);
  }
  sourceEl.textContent = '';
  if (node.dataSource && node.dataSource.fred) {
    const fredId = node.dataSource.fred;
    /* 원천 기관명 매핑 */
    const agencyMap = {
      'FEDFUNDS': 'Federal Reserve', 'DFF': 'Federal Reserve', 'DFII10': 'US Treasury',
      'CPIAUCSL': 'BLS (노동통계국)', 'UNRATE': 'BLS (노동통계국)', 'PAYEMS': 'BLS (노동통계국)',
      'CIVPART': 'BLS (노동통계국)', 'A191RL1Q225SBEA': 'BEA (경제분석국)',
      'DGS10': 'US Treasury', 'T10Y2Y': 'US Treasury', 'T5YIE': 'US Treasury',
      'NASDAQCOM': 'NASDAQ', 'DTWEXBGS': 'Federal Reserve', 'VIXCLS': 'CBOE',
      'DCOILWTICO': 'EIA (에너지정보국)', 'GOLDAMGBD228NLBM': 'LBMA (런던금시장)',
      'WALCL': 'Federal Reserve', 'M2SL': 'Federal Reserve', 'GFDEBTN': 'US Treasury',
      'CSUSHPISA': 'S&P/Case-Shiller', 'UMCSENT': 'Univ. of Michigan',
      'NAPM': 'ISM (공급관리협회)', 'BAMLH0A0HYM2': 'ICE BofA',
      'USEPUINDXD': 'PolicyUncertainty.com', 'OVXCLS': 'CBOE',
      'RSAFS': 'Census Bureau', 'DEXKOUS': 'Federal Reserve',
      'ICSA': 'DOL (노동부)', 'PCOPPUSDM': 'IMF',
    };
    const agency = agencyMap[fredId] || 'FRED';
    const a = document.createElement('a');
    a.href = 'https://fred.stlouisfed.org/series/' + encodeURIComponent(fredId);
    a.target = '_blank';
    a.rel = 'noopener';
    a.style.cssText = 'color:#64748b;font-size:11px;text-decoration:underline;display:inline-block;margin-top:8px;';
    a.textContent = '출처: ' + agency + ' (FRED: ' + fredId + ')';

  }

  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');

  /* URL 상태 업데이트 */

  /* 스파크라인 (FRED 데이터 있으면) */
  setTimeout(() => renderSparkline(node), 50);

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('bottom-sheet').classList.remove('show');
  document.getElementById('sheet-spark').textContent = '';
  clearHighlight();
  selectedNode = null;
  hoverActive = false;

  /* URL에서 focus 파라미터 제거 */
  const url = new URL(location);
  url.searchParams.delete('focus');
  url.searchParams.delete('sim');
  history.replaceState(null, '', url.pathname + (url.search || ''));
}

/* ── 바텀시트 풀 스와이프 + 스냅 ── */
(function initSheetSwipe() {
  const sheet = document.getElementById('bottom-sheet');
  let startY = 0, currentY = 0, dragging = false;

  /* 시트 전체에서 스와이프 가능 (스크롤 맨 위일 때만) */
  sheet.addEventListener('touchstart', (e) => {
    if (sheet.scrollTop > 0) return; // 내부 스크롤 중이면 무시
    startY = e.touches[0].clientY;
    currentY = startY;
    dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const dy = currentY - startY;
    if (dy > 0) {
      sheet.style.transform = 'translateY(' + dy + 'px)';
    } else if (dy < -10) {
      /* 위로 스와이프 → 드래그 해제, 스크롤로 전환 */
      dragging = false;
      sheet.style.transition = 'transform .25s ease';
      sheet.style.transform = 'translateY(0)';
    }
  }, { passive: true });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = 'transform .25s ease';
    const dy = currentY - startY;
    const vh = window.innerHeight;
    if (dy > vh * 0.25) {
      /* 25% 이상 드래그 → 닫기 */
      closeSheet();
    } else if (dy > vh * 0.1) {
      /* 10-25% → 50vh 스냅 */
      sheet.style.maxHeight = '50vh';
      sheet.style.transform = 'translateY(0)';
    } else {
      /* 복원 */
      sheet.style.transform = 'translateY(0)';
    }
  });
})();

/* ── 더블탭 줌 (노드로 줌인) ── */
(function initDoubleTapZoom() {
  let lastTap = 0;
  svg.on('touchend.doubletap', function(e) {
    const now = Date.now();
    if (now - lastTap < 300) {
      e.preventDefault();
      const svgW = window.innerWidth, svgH = window.innerHeight - BAR_H;
      const t = d3.zoomTransform(svg.node());
      const newScale = t.k < 1.5 ? 2.0 : 0.8;
      const p = d3.pointer(e, svg.node());
      const newT = d3.zoomIdentity
        .translate(svgW / 2, svgH / 2)
        .scale(newScale)
        .translate(-p[0], -p[1]);
      svg.transition().duration(300).call(zoomBehavior.transform, newT);
    }
    lastTap = now;
  });
})();

/* ================================================================
   BFS SIMULATION — "오르면? / 내리면?"
   ================================================================ */
function runSim(startNode, direction) {
  const impacts = {}; // nodeId → { node, dir, impact (0-1), link, depth }
  const queue = [{ id: startNode.id, dir: direction, impact: 1.0, depth: 0 }];

  while (queue.length) {
    const cur = queue.shift();
    if (cur.depth >= 3) continue; // max depth

    DATA.links.forEach(link => {
      if (link.source !== cur.id) return;
      const tgt = nodeMap[link.target];
      if (!tgt || tgt.level > currentLevel) return;

      let rDir;
      if (link.type === '비례')        rDir = cur.dir;
      else if (link.type === '반비례') rDir = (cur.dir === 'up' ? 'down' : 'up');
      else                             rDir = 'cond';

      const decay = (link.strength || 3) / 5;
      const newImpact = cur.impact * decay;

      if (!impacts[link.target] || newImpact > impacts[link.target].impact) {
        impacts[link.target] = {
          node: tgt, dir: rDir, impact: newImpact, link: link, depth: cur.depth + 1
        };
        queue.push({ id: link.target, dir: rDir, impact: newImpact, depth: cur.depth + 1 });
      }
    });
  }

  const results = Object.values(impacts).sort((a, b) => b.impact - a.impact);

  /* display in sheet */
  const dirLabel = direction === 'up' ? '상승' : '하락';
  const interpEl = document.getElementById('sheet-interp');
  interpEl.textContent = '';

  const header = document.createElement('div');
  header.style.cssText = 'font-weight:700;margin-bottom:8px;font-size:13px;';
  header.textContent = startNode.label + ' ' + dirLabel + ' 시 연쇄 효과 (3단계 전파):';
  interpEl.appendChild(header);

  if (!results.length) {
    const empty = document.createElement('div');
    empty.style.color = '#64748b';
    empty.textContent = '영향받는 노드 없음';
    interpEl.appendChild(empty);
  } else {
    results.forEach(r => {
      const str = r.link.strength || 3;
      const row = document.createElement('div');
      row.style.cssText = 'padding:4px 0;border-bottom:1px solid #ffffff08;';

      const bold = document.createElement('b');
      bold.textContent = r.node.label;
      row.appendChild(bold);
      row.appendChild(document.createTextNode(' '));

      const iconSpan = document.createElement('span');
      if (r.dir === 'up') {
        iconSpan.style.color = '#16a34a';
        if (str >= 5)      { iconSpan.style.fontWeight = '700'; iconSpan.textContent = '\u25B2\u25B2 강하게 상승'; }
        else if (str >= 3) { iconSpan.textContent = '\u25B2 상승'; }
        else               { iconSpan.style.opacity = '0.7'; iconSpan.textContent = '\u25B2 약하게 상승'; }
      } else if (r.dir === 'down') {
        iconSpan.style.color = '#dc2626';
        if (str >= 5)      { iconSpan.style.fontWeight = '700'; iconSpan.textContent = '\u25BC\u25BC 강하게 하락'; }
        else if (str >= 3) { iconSpan.textContent = '\u25BC 하락'; }
        else               { iconSpan.style.opacity = '0.7'; iconSpan.textContent = '\u25BC 약하게 하락'; }
      } else {
        iconSpan.style.color = '#ca8a04';
        iconSpan.textContent = '\u25C6 조건부';
      }
      row.appendChild(iconSpan);

      const impactPct = document.createElement('span');
      impactPct.style.cssText = 'color:#a78bfa;font-size:11px;margin-left:6px;font-weight:600;';
      impactPct.textContent = '(영향도 ' + Math.round(r.impact * 100) + '%)';
      row.appendChild(impactPct);

      /* 시차(lag) + 인과/상관 태그 */
      if (r.link.lag || r.link.relation) {
        const meta = document.createElement('span');
        meta.style.cssText = 'font-size:10px;margin-left:6px;';
        const parts = [];
        if (r.link.lag) parts.push('\u23F1 ' + r.link.lag);
        if (r.link.relation) {
          const relLabel = r.link.relation === 'causal' ? '\u2192 인과' : '\u2194 상관';
          parts.push(relLabel);
        }
        meta.style.color = '#6366f1';
        meta.textContent = parts.join(' | ');
        row.appendChild(meta);
      }

      /* 레짐 조건부 경고 */
      if (r.link.caveat) {
        const caveatEl = document.createElement('div');
        caveatEl.style.cssText = 'color:#f59e0b;font-size:10px;margin-top:2px;font-style:italic;';
        caveatEl.textContent = '\u26A0 ' + r.link.caveat;
        row.appendChild(caveatEl);
      }

      const desc = document.createElement('span');
      desc.style.cssText = 'color:#64748b;font-size:11px;margin-left:4px;display:block;';
      desc.textContent = r.link.description || '';
      row.appendChild(desc);

      const bar = document.createElement('div');
      const barColor = r.dir === 'up' ? '#16a34a' : r.dir === 'down' ? '#dc2626' : '#ca8a04';
      bar.style.cssText = 'margin-top:2px;height:3px;max-width:100%;border-radius:2px;opacity:0.4;width:' + (str * 20) + '%;background:' + barColor + ';';
      row.appendChild(bar);

      interpEl.appendChild(row);
    });
  }

  /* highlight simulation path */
  const affIds  = new Set([startNode.id, ...results.map(r => r.node.id)]);
  const affLink = new Set(results.map(r => r.link.id));

  gNodes.selectAll('g.node-g').classed('node-dim', d => !affIds.has(d.id));
  gLinks.selectAll('path.link-line')
    .classed('link-dim', d => !affLink.has(d.id))
    .classed('link-hl',  d => affLink.has(d.id))
    .attr('stroke-width', d => {
      const base = strengthWidth(d.strength || 3);
      return affLink.has(d.id) ? base + 1 : base;
    });
}

/* ================================================================
   MULTI-SIM — 복합 시나리오
   ================================================================ */
let multiSimMode = false;
const multiSimSelections = {}; // nodeId → 'up' | 'down'

function openMultiSimPanel() {
  multiSimMode = true;
  Object.keys(multiSimSelections).forEach(k => delete multiSimSelections[k]);
  const panel = document.getElementById('multi-sim-panel');
  const list = document.getElementById('multi-sim-list');
  list.textContent = '';

  DATA.nodes.filter(n => n.level <= currentLevel).forEach(n => {
    const chip = document.createElement('button');
    chip.style.cssText = 'padding:6px 10px;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid #3a3a5a;background:#23233a;color:#94a3b8;font-family:inherit;transition:all .15s;';
    chip.textContent = n.label;
    chip.dataset.nodeId = n.id;
    chip.dataset.dir = '';
    chip.addEventListener('click', () => {
      const dirs = ['', 'up', 'down'];
      const ci = (dirs.indexOf(chip.dataset.dir) + 1) % 3;
      chip.dataset.dir = dirs[ci];
      if (dirs[ci] === 'up') {
        chip.style.background = '#16a34a33'; chip.style.borderColor = '#16a34a'; chip.style.color = '#22c55e';
        chip.textContent = n.label + ' \u25B2';
        multiSimSelections[n.id] = 'up';
      } else if (dirs[ci] === 'down') {
        chip.style.background = '#dc262633'; chip.style.borderColor = '#dc2626'; chip.style.color = '#f87171';
        chip.textContent = n.label + ' \u25BC';
        multiSimSelections[n.id] = 'down';
      } else {
        chip.style.background = '#23233a'; chip.style.borderColor = '#3a3a5a'; chip.style.color = '#94a3b8';
        chip.textContent = n.label;
        delete multiSimSelections[n.id];
      }
    });
    list.appendChild(chip);
  });

  panel.style.display = 'block';
}

function closeMultiSimPanel() {
  multiSimMode = false;
  document.getElementById('multi-sim-panel').style.display = 'none';
}

function runMultiSim() {
  const starts = Object.entries(multiSimSelections);
  if (!starts.length) return;

  closeMultiSimPanel();

  /* Weighted propagation from multiple start points */
  const impacts = {}; // nodeId → { node, dir, impact, link, depth }
  const startSet = new Set(starts.map(s => s[0]));
  const queue = starts.map(([id, dir]) => ({ id, dir, impact: 1.0, depth: 0 }));

  while (queue.length) {
    const cur = queue.shift();
    if (cur.depth >= 3) continue; // max depth

    DATA.links.forEach(link => {
      if (link.source !== cur.id) return;
      const tgt = nodeMap[link.target];
      if (!tgt || tgt.level > currentLevel) return;

      let rDir;
      if (link.type === '비례')        rDir = cur.dir;
      else if (link.type === '반비례') rDir = (cur.dir === 'up' ? 'down' : 'up');
      else                             rDir = 'cond';

      const decay = (link.strength || 3) / 5;
      const newImpact = cur.impact * decay;

      if (!impacts[link.target] || newImpact > impacts[link.target].impact) {
        impacts[link.target] = {
          node: tgt, dir: rDir, impact: newImpact, link: link, depth: cur.depth + 1
        };
        queue.push({ id: link.target, dir: rDir, impact: newImpact, depth: cur.depth + 1 });
      }
    });
  }

  // Exclude start nodes from results
  startSet.forEach(id => delete impacts[id]);
  const results = Object.values(impacts).sort((a, b) => b.impact - a.impact);

  /* Display results in sheet */
  const startLabels = starts.map(([id, dir]) => nodeMap[id].label + (dir === 'up' ? '\u25B2' : '\u25BC')).join(' + ');
  const interpEl = document.getElementById('sheet-interp');
  interpEl.textContent = '';

  document.getElementById('sheet-title').textContent = '복합 시나리오';
  document.getElementById('sheet-sub').textContent = startLabels;
  document.getElementById('sheet-desc').textContent = starts.length + '개 지표 동시 변동 시 연쇄 효과 (3단계 전파)';
  document.getElementById('sheet-spark').textContent = '';

  const header = document.createElement('div');
  header.style.cssText = 'font-weight:700;margin-bottom:8px;font-size:13px;';
  header.textContent = '연쇄 효과 (' + results.length + '개 지표 영향):';
  interpEl.appendChild(header);

  results.forEach(r => {
    const str = r.link.strength || 3;
    const row = document.createElement('div');
    row.style.cssText = 'padding:4px 0;border-bottom:1px solid #ffffff08;';

    const bold = document.createElement('b');
    bold.textContent = r.node.label;
    row.appendChild(bold);
    row.appendChild(document.createTextNode(' '));

    const iconSpan = document.createElement('span');
    if (r.dir === 'up') {
      iconSpan.style.color = '#16a34a';
      iconSpan.textContent = str >= 5 ? '\u25B2\u25B2 강하게 상승' : str >= 3 ? '\u25B2 상승' : '\u25B2 약하게 상승';
    } else if (r.dir === 'down') {
      iconSpan.style.color = '#dc2626';
      iconSpan.textContent = str >= 5 ? '\u25BC\u25BC 강하게 하락' : str >= 3 ? '\u25BC 하락' : '\u25BC 약하게 하락';
    } else {
      iconSpan.style.color = '#ca8a04';
      iconSpan.textContent = '\u25C6 조건부';
    }
    row.appendChild(iconSpan);

    const impactPct = document.createElement('span');
    impactPct.style.cssText = 'color:#a78bfa;font-size:11px;margin-left:6px;font-weight:600;';
    impactPct.textContent = '(영향도 ' + Math.round(r.impact * 100) + '%)';
    row.appendChild(impactPct);

    /* 레짐 조건부 경고 */
    if (r.link.caveat) {
      const caveatEl = document.createElement('div');
      caveatEl.style.cssText = 'color:#f59e0b;font-size:10px;margin-top:2px;font-style:italic;';
      caveatEl.textContent = '\u26A0 ' + r.link.caveat;
      row.appendChild(caveatEl);
    }

    const desc = document.createElement('span');
    desc.style.cssText = 'color:#64748b;font-size:11px;margin-left:4px;display:block;';
    desc.textContent = r.link.description || '';
    row.appendChild(desc);

    interpEl.appendChild(row);
  });

  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');

  /* highlight */
  const allIds = new Set([...starts.map(s => s[0]), ...results.map(r => r.node.id)]);
  const allLinks = new Set(results.map(r => r.link.id));
  gNodes.selectAll('g.node-g').classed('node-dim', d => !allIds.has(d.id));
  gLinks.selectAll('path.link-line')
    .classed('link-dim', d => !allLinks.has(d.id))
    .classed('link-hl',  d => allLinks.has(d.id));
}

/* ================================================================
   HIGHLIGHT / DIM
   ================================================================ */
function highlightNode(node) {
  const conn = new Set([node.id]);
  DATA.links.forEach(l => {
    if (l.source === node.id) conn.add(l.target);
    if (l.target === node.id) conn.add(l.source);
  });

  gNodes.selectAll('g.node-g').classed('node-dim', d => !conn.has(d.id));
  gLinks.selectAll('path.link-line')
    .classed('link-dim', d => d.source !== node.id && d.target !== node.id)
    .classed('link-hl',  d => d.source === node.id || d.target === node.id)
    .attr('stroke-width', d => {
      const base = strengthWidth(d.strength || 3);
      return (d.source === node.id || d.target === node.id) ? base + 1 : base;
    });
}

function clearHighlight() {
  gNodes.selectAll('g.node-g').classed('node-dim', false);
  gLinks.selectAll('path.link-line')
    .classed('link-dim', false).classed('link-hl', false)
    .attr('stroke-width', d => strengthWidth(d.strength || 3));
}

/* ================================================================
   SEARCH
   ================================================================ */
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { clearHighlight(); return; }

  const matched = DATA.nodes.filter(n =>
    n.level <= currentLevel && (
      n.label.toLowerCase().includes(q) ||
      n.sub.toLowerCase().includes(q) ||
      (n.description && n.description.toLowerCase().includes(q)) ||
      (n.tags && n.tags.some(t => t.toLowerCase().includes(q)))
    )
  );
  const ids = new Set(matched.map(n => n.id));

  gNodes.selectAll('g.node-g').classed('node-dim', d => d.level <= currentLevel && !ids.has(d.id));
  gLinks.selectAll('path.link-line').classed('link-dim', true).classed('link-hl', false);

  /* auto-pan to single result */
  if (matched.length === 1) {
    const n = matched[0];
    const svgW = window.innerWidth, svgH = window.innerHeight - BAR_H;
    const sc = 1.2;
    const t = d3.zoomIdentity.translate(svgW/2 - n.cx*sc, svgH/2 - n.cy*sc).scale(sc);
    svg.transition().duration(350).call(zoomBehavior.transform, t);
  }
});

/* ================================================================
   CATEGORY FILTER
   ================================================================ */
function applyCategoryFilter(catName) {
  if (catFilter === catName) {
    catFilter = null; // toggle off
  } else {
    catFilter = catName;
  }

  gNodes.selectAll('g.node-g')
    .attr('display', d => {
      if (d.level > currentLevel) return 'none';
      if (catFilter && d.category !== catFilter) return 'none';
      return null;
    });

  gLinks.selectAll('path.link-line, path.link-hit')
    .attr('display', d => {
      if (!linkVisible(d)) return 'none';
      if (catFilter) {
        const s = nodeMap[d.source], t = nodeMap[d.target];
        if (s.category !== catFilter && t.category !== catFilter) return 'none';
      }
      return null;
    });

  gBoxes.selectAll('g').each(function(box) {
    const show = !catFilter || box.name === catFilter;
    d3.select(this).attr('display', show && box.visible ? null : 'none');
  });
}

/* ================================================================
   CATEGORY FILTER CHIPS
   ================================================================ */
function renderCatChips() {
  const container = document.getElementById('cat-chips');
  container.textContent = '';
  const cats = DATA.categories;
  Object.keys(cats).forEach(catName => {
    const chip = document.createElement('span');
    chip.className = 'cat-chip';
    chip.textContent = catName;
    chip.style.borderColor = cats[catName].color;
    chip.addEventListener('click', () => {
      applyCategoryFilter(catName);
      /* update chip active state */
      container.querySelectorAll('.cat-chip').forEach(c => {
        const isActive = c.textContent === catFilter;
        c.classList.toggle('active', isActive);
        c.style.background = isActive ? cats[c.textContent].color + '33' : '#23233a';
        c.style.color = isActive ? '#fff' : '#aaa';
      });
    });
    container.appendChild(chip);
  });
}

/* ================================================================
   DASHBOARD — 경제 지표 신호등
   ================================================================ */
function renderDashboard() {
  const grid = document.getElementById('dash-grid');
  grid.textContent = '';

  const categories = ['매크로 지표', '시장 지표', '자산', '리스크'];

  categories.forEach(cat => {
    /* 카테고리 헤더 */
    const catHeader = document.createElement('div');
    catHeader.style.cssText = 'grid-column:1/-1;font-size:12px;font-weight:700;color:' + (DATA.categories[cat]?.color || '#94a3b8') + ';margin-top:8px;padding:4px 0;border-bottom:1px solid #2a2a3a;';
    catHeader.textContent = cat;
    grid.appendChild(catHeader);

    DATA.nodes.filter(n => n.category === cat).forEach(node => {
      const card = document.createElement('div');
      card.style.cssText = 'background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;';

      /* 신호등 색상 결정 */
      let statusColor = '#555'; // 기본 회색
      let statusText = '—';

      if (node._pct != null) {
        const pct = node._pct;
        if (Math.abs(pct) < 1) {
          statusColor = '#22c55e'; statusText = '안정';
        } else if (Math.abs(pct) < 5) {
          statusColor = pct > 0 ? '#16a34a' : '#dc2626';
          statusText = pct > 0 ? '상승' : '하락';
        } else {
          statusColor = pct > 0 ? '#f59e0b' : '#dc2626';
          statusText = pct > 0 ? '급등 주의' : '급락 주의';
        }
      }

      /* 특수 임계값 */
      if (node.id === 'us_vix' && node._val >= 30) { statusColor = '#dc2626'; statusText = '공포'; }
      if (node.id === 'us_vix' && node._val >= 20 && node._val < 30) { statusColor = '#f59e0b'; statusText = '불안'; }
      if (node.id === 'us_spread' && node._val < 0) { statusColor = '#dc2626'; statusText = '역전'; }
      if (node.id === 'us_hy' && node._val >= 500) { statusColor = '#dc2626'; statusText = '스트레스'; }

      const label = document.createElement('div');
      label.style.cssText = 'font-size:12px;font-weight:700;color:#e2e8f0;margin-bottom:4px;';
      label.textContent = node.label;

      const valueRow = document.createElement('div');
      valueRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';

      const valSpan = document.createElement('span');
      valSpan.style.cssText = 'font-size:13px;font-weight:700;color:' + statusColor + ';';
      valSpan.textContent = node._pct != null ? (node._pct > 0 ? '+' : '') + node._pct.toFixed(1) + '%' : '—';

      const badge = document.createElement('span');
      badge.style.cssText = 'font-size:9px;padding:2px 6px;border-radius:4px;color:#fff;background:' + statusColor + ';';
      badge.textContent = statusText;

      valueRow.append(valSpan, badge);
      card.append(label, valueRow);

      card.addEventListener('click', () => {
        document.getElementById('dashboard-panel').style.display = 'none';
        openSheet(node);
      });

      grid.appendChild(card);
    });
  });
}
