<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Economic Map</title>
<script src="d3.min.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#0f0f14; color:#e2e8f0;
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── SVG ── */
svg { display:block; width:100%; height:100%; }
.cat-box { fill:#1a1a24; stroke-width:1; }
.cat-label { fill:#cbd5e1; font-size:14px; font-weight:700; }

/* ── Node styles ── */
.node-circle { cursor:pointer; stroke-width:2.5; }
.node-rect   { cursor:pointer; stroke-width:1.5; }
.node-label  { fill:#fff; font-size:13px; font-weight:700; text-anchor:middle; pointer-events:none; }
.node-sub    { fill:#94a3b8; font-size:10px; text-anchor:middle; pointer-events:none; }
.node-value  { font-size:10.5px; text-anchor:middle; pointer-events:none; }

/* ── Link ── */
.link-line { fill:none; stroke-width:1.8; opacity:0.6; }

/* ── Highlight / Dim ── */
.node-dim  { opacity:0.12 !important; }
.link-dim  { opacity:0.04 !important; }
.link-hl   { opacity:0.95 !important; stroke-width:2.5; }

/* ── Bottom bar ── */
#bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:#16161eee; border-top:1px solid #2a2a3a;
  padding:8px 10px; display:flex; gap:6px; align-items:center;
  z-index:100; justify-content:center;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
}
#bottom-bar button {
  background:#23233a; color:#e2e8f0; border:1px solid #3a3a5a;
  border-radius:8px; padding:7px 13px; font-size:12px; cursor:pointer;
  white-space:nowrap; font-family:inherit; font-weight:600;
  transition:all .15s;
}
#bottom-bar button.active { background:#4f46e5; border-color:#6366f1; color:#fff; }
#bottom-bar button:active { transform:scale(0.95); }
#search-input {
  background:#1a1a2e; color:#e2e8f0; border:1px solid #3a3a5a;
  border-radius:8px; padding:7px 10px; font-size:12px; width:90px;
  outline:none; font-family:inherit;
}
#search-input:focus { border-color:#6366f1; width:120px; transition:width .2s; }

/* ── Bottom sheet ── */
#sheet-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
  display:none; opacity:0; transition:opacity .2s;
}
#sheet-overlay.show { display:block; opacity:1; }
#bottom-sheet {
  position:fixed; bottom:0; left:0; right:0;
  background:#1e1e2e; border-top-left-radius:16px; border-top-right-radius:16px;
  padding:20px 18px 34px; z-index:210;
  transform:translateY(100%); transition:transform .25s ease;
  max-height:65vh; overflow-y:auto;
}
#bottom-sheet.show { transform:translateY(0); }
#sheet-handle { width:40px; height:4px; background:#444; border-radius:2px; margin:0 auto 14px; }
#sheet-title { font-size:18px; font-weight:700; margin-bottom:4px; }
#sheet-sub { font-size:13px; color:#94a3b8; margin-bottom:10px; }
#sheet-desc { font-size:13px; color:#cbd5e1; margin-bottom:12px; line-height:1.5; }
.sheet-btn-row { display:flex; gap:8px; margin-bottom:12px; }
.sim-btn {
  flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:600;
  border:none; cursor:pointer; font-family:inherit;
}
.sim-btn.up   { background:#16a34a22; color:#22c55e; border:1px solid #16a34a55; }
.sim-btn.down { background:#dc262622; color:#f87171; border:1px solid #dc262655; }
.sim-btn:active { transform:scale(0.97); }
#sheet-interp { font-size:12.5px; color:#cbd5e1; line-height:1.6; }

/* ── Category filter chips ── */
.cat-chip {
  background:#23233a; color:#aaa; border:1px solid #3a3a5a;
  border-radius:14px; padding:5px 10px; font-size:11px; cursor:pointer;
  white-space:nowrap; font-family:inherit; transition:all .15s;
}
.cat-chip.active { color:#fff; }
</style>
</head>
<body>

<svg id="svg"></svg>

<!-- Bottom bar -->
<div id="bottom-bar">
  <input id="search-input" placeholder="검색..." />
  <button id="btn-lv1" class="active" data-lv="1">핵심</button>
  <button id="btn-lv2" data-lv="2">기본</button>
  <button id="btn-lv3" data-lv="3">심화</button>
  <button id="btn-edit">수정</button>
</div>

<!-- Bottom sheet overlay -->
<div id="sheet-overlay"></div>
<div id="bottom-sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-title"></div>
  <div id="sheet-sub"></div>
  <div id="sheet-desc"></div>
  <div class="sheet-btn-row">
    <button class="sim-btn up" id="btn-sim-up">오르면?</button>
    <button class="sim-btn down" id="btn-sim-down">내리면?</button>
  </div>
  <div id="sheet-interp"></div>
</div>

<script>
/* ================================================================
   Economic Map v4 — Complete Rewrite
   ================================================================ */

/* ── Constants ── */
const CAT_ORDER = ['매크로 지표','현금/예금','채권','주식','부동산','원자재/금'];
const BOX_W      = 340;
const SP_X_IND   = 105, SP_Y_IND = 86;
const SP_X_AST   = 105, SP_Y_AST = 108;
const MAX_COLS   = 3;
const PAD_X      = 16,  PAD_TOP = 34, PAD_BOT = 28, BOX_GAP = 16;
const NODE_R     = 22,  ASSET_EXTRA = 12;
const RECT_W     = 88,  RECT_H  = 48;
const BAR_H      = 52;

/* ── State ── */
let DATA, VALS, nodeMap = {};
let boxes = [];
let currentLevel = 1;
let editMode     = false;
let selectedNode  = null;
let catFilter     = null;        // null = show all
let W = window.innerWidth;
let H = window.innerHeight;

/* ── D3 setup ── */
const svg   = d3.select('#svg');
/* defs for arrowheads */
const defs  = svg.append('defs');
['#16a34a','#dc2626','#ca8a04'].forEach(c => {
  defs.append('marker')
    .attr('id', 'arrow-' + c.replace('#',''))
    .attr('viewBox','0 0 10 10')
    .attr('refX', 28).attr('refY', 5)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient','auto-start-reverse')
    .append('path').attr('d','M0,0 L10,5 L0,10 Z').attr('fill', c);
});

const gRoot  = svg.append('g');
const gBoxes = gRoot.append('g');
const gLinks = gRoot.append('g');
const gNodes = gRoot.append('g');

/* ── Zoom ── */
const zoomBehavior = d3.zoom()
  .scaleExtent([0.1, 5])
  .filter(e => {
    /* In edit mode, only allow zoom via pinch/wheel, not pan */
    if (editMode && e.type === 'mousedown') return false;
    return true;
  })
  .on('zoom', e => gRoot.attr('transform', e.transform));
svg.call(zoomBehavior);

/* ================================================================
   DATA LOAD
   ================================================================ */
Promise.all([
  fetch('data/data.json').then(r => r.json()),
  fetch('data/values.json').then(r => r.json()).catch(() => null)
]).then(([data, vals]) => {
  DATA = data;
  VALS = vals;
  init();
});

/* ================================================================
   INIT
   ================================================================ */
function init() {
  DATA.nodes.forEach(n => { n.dx = 0; n.dy = 0; });
  nodeMap = {};
  DATA.nodes.forEach(n => nodeMap[n.id] = n);

  attachValues();
  computeLayout();
  renderAll();
  fitView(0);
  bindEvents();
}

/* ================================================================
   FRED values → nodes
   ================================================================ */
function attachValues() {
  if (!VALS || !VALS.data) return;
  DATA.nodes.forEach(n => {
    const key = n.dataSource && n.dataSource.fred;
    if (!key) { n._val = null; n._dir = null; return; }
    const s = VALS.data[key];
    if (!s || s.length < 2) { n._val = null; n._dir = null; return; }
    const cur  = parseFloat(s[0].value);
    const prev = parseFloat(s[1].value);
    n._val = cur;
    n._dir = cur > prev ? 'up' : cur < prev ? 'down' : 'flat';
  });
}

/* ================================================================
   LAYOUT — auto grid: fit boxes into screen aspect ratio
   ================================================================ */
function computeLayout() {
  boxes = [];

  /* 1) 각 박스 높이 계산 (내용 기반) */
  const tempBoxes = [];
  CAT_ORDER.forEach(catName => {
    const catNds = DATA.nodes.filter(n => n.category === catName && n.level <= currentLevel);
    if (!catNds.length) {
      tempBoxes.push({ name:catName, h:0, visible:false, color:DATA.categories[catName].color, nodes:[] });
      return;
    }
    const assetNds = catNds.filter(n => n.isAsset);
    const indNds = catNds.filter(n => !n.isAsset);
    let innerY = PAD_TOP;
    if (assetNds.length) {
      const cols = Math.min(assetNds.length, MAX_COLS);
      innerY += Math.ceil(assetNds.length / cols) * SP_Y_AST;
    }
    if (indNds.length) {
      const cols = Math.min(indNds.length, MAX_COLS);
      innerY += Math.ceil(indNds.length / cols) * SP_Y_IND;
    }
    tempBoxes.push({ name:catName, h:innerY+PAD_BOT, visible:true, color:DATA.categories[catName].color, nodes:catNds, assetNds, indNds });
  });

  const visBoxes = tempBoxes.filter(b => b.visible);

  /* 2) 화면 비율에 맞게 열 수 자동 결정 */
  const screenRatio = W / Math.max(H - 100, 1); // 하단바 고려
  let numCols;
  if (visBoxes.length <= 2) numCols = visBoxes.length;
  else if (screenRatio > 1.2) numCols = 3; // 가로 넓으면 3열
  else if (screenRatio > 0.6) numCols = 2; // 세로 폰이면 2열
  else numCols = 1;
  numCols = Math.min(numCols, visBoxes.length);

  /* 3) 박스를 열에 배분 (높이 균형) */
  const colHeights = Array(numCols).fill(0);
  const colAssign = []; // 각 박스가 몇 번 열인지
  visBoxes.forEach(b => {
    // 가장 낮은 열에 배치
    let minCol = 0;
    for (let c = 1; c < numCols; c++) { if (colHeights[c] < colHeights[minCol]) minCol = c; }
    colAssign.push(minCol);
    colHeights[minCol] += b.h + BOX_GAP;
  });

  /* 4) 각 박스 x,y 좌표 계산 */
  const colYs = Array(numCols).fill(0);
  visBoxes.forEach((b, i) => {
    const col = colAssign[i];
    b.x = col * (BOX_W + BOX_GAP);
    b.y = colYs[col];
    colYs[col] += b.h + BOX_GAP;
  });

  /* 5) 박스 내 노드 위치 계산 */
  visBoxes.forEach(b => {
    let innerY = PAD_TOP;
    if (b.assetNds && b.assetNds.length) {
      const cols = Math.min(b.assetNds.length, MAX_COLS);
      const cw = cols * SP_X_AST;
      b.assetNds.forEach((n, i) => {
        const c = i % cols, r = Math.floor(i / cols);
        n.cx = b.x + (BOX_W - cw) / 2 + SP_X_AST / 2 + c * SP_X_AST + n.dx;
        n.cy = b.y + innerY + SP_Y_AST / 2 + r * SP_Y_AST + n.dy;
      });
      innerY += Math.ceil(b.assetNds.length / cols) * SP_Y_AST;
    }
    if (b.indNds && b.indNds.length) {
      const cols = Math.min(b.indNds.length, MAX_COLS);
      const cw = cols * SP_X_IND;
      b.indNds.forEach((n, i) => {
        const c = i % cols, r = Math.floor(i / cols);
        n.cx = b.x + (BOX_W - cw) / 2 + SP_X_IND / 2 + c * SP_X_IND + n.dx;
        n.cy = b.y + innerY + SP_Y_IND / 2 + r * SP_Y_IND + n.dy;
      });
    }
    b.w = BOX_W;
    boxes.push(b);
  });

  /* 비표시 박스도 추가 */
  tempBoxes.filter(b => !b.visible).forEach(b => { b.w = BOX_W; b.h = 0; boxes.push(b); });

  /* 숨겨진 노드 화면 밖 */
  DATA.nodes.forEach(n => { if (n.level > currentLevel) { n.cx = -9999; n.cy = -9999; } });
}

/* ================================================================
   RENDER — full draw
   ================================================================ */
function renderAll() {
  renderLinks();
  renderBoxes();
  renderNodes();
}

/* ── Links ── */
function renderLinks() {
  gLinks.selectAll('*').remove();

  DATA.links.forEach(link => {
    const s = nodeMap[link.source], t = nodeMap[link.target];
    if (!s || !t) return;
    const col = linkColor(link);
    gLinks.append('line')
      .datum(link)
      .attr('class','link-line')
      .attr('stroke', col)
      .attr('marker-end', 'url(#arrow-' + col.replace('#','') + ')')
      .attr('x1', s.cx).attr('y1', s.cy)
      .attr('x2', t.cx).attr('y2', t.cy)
      .attr('display', linkVisible(link) ? null : 'none');
  });
}

function linkColor(l) {
  if (l.type === '비례')   return '#16a34a';
  if (l.type === '반비례') return '#dc2626';
  return '#ca8a04';
}

function linkVisible(l) {
  const s = nodeMap[l.source], t = nodeMap[l.target];
  return s.level <= currentLevel && t.level <= currentLevel;
}

function updateLinkPositions(animate) {
  const sel = gLinks.selectAll('line.link-line');
  const s = animate ? sel.transition().duration(400) : sel;
  s.attr('x1', d => nodeMap[d.source].cx)
   .attr('y1', d => nodeMap[d.source].cy)
   .attr('x2', d => nodeMap[d.target].cx)
   .attr('y2', d => nodeMap[d.target].cy);

  sel.attr('display', d => linkVisible(d) ? null : 'none');
}

/* ── Boxes ── */
function renderBoxes() {
  gBoxes.selectAll('*').remove();

  boxes.forEach(box => {
    if (!box.visible) return;
    const g = gBoxes.append('g').datum(box);

    g.append('rect')
      .attr('class','cat-box')
      .attr('x', box.x).attr('y', box.y)
      .attr('width', box.w).attr('height', box.h)
      .attr('rx', 10)
      .attr('stroke', box.color);

    g.append('text')
      .attr('class','cat-label')
      .attr('x', box.x + 12).attr('y', box.y + 18)
      .text(box.name);

    /* box drag in edit mode */
    g.call(d3.drag()
      .filter(() => editMode)
      .on('drag', function(event) {
        const dx = event.dx, dy = event.dy;
        box.x += dx; box.y += dy;
        /* move contained nodes */
        DATA.nodes.filter(n => n.category === box.name && n.level <= currentLevel)
          .forEach(n => { n.cx += dx; n.cy += dy; });
        refreshPositions();
      })
    );
  });
}

function updateBoxPositions(animate) {
  const gs = gBoxes.selectAll('g').data(boxes.filter(b => b.visible), d => d.name);
  gs.each(function(box) {
    const g = d3.select(this);
    const r = animate ? g.select('rect').transition().duration(400) : g.select('rect');
    r.attr('x', box.x).attr('y', box.y)
     .attr('width', box.w).attr('height', box.h);
    const t = animate ? g.select('text').transition().duration(400) : g.select('text');
    t.attr('x', box.x + 12).attr('y', box.y + 18);
  });
}

/* ── Nodes ── */
function renderNodes() {
  gNodes.selectAll('*').remove();

  DATA.nodes.forEach(node => {
    const g = gNodes.append('g')
      .datum(node)
      .attr('class','node-g')
      .attr('transform', `translate(${node.cx},${node.cy})`)
      .attr('display', node.level <= currentLevel ? null : 'none');

    if (node.isAsset) {
      /* big circle */
      g.append('circle')
        .attr('class','node-circle')
        .attr('r', NODE_R + ASSET_EXTRA)
        .attr('fill', nodeFill(node))
        .attr('stroke', nodeStroke(node));

      g.append('text').attr('class','node-label')
        .attr('y', 1).text(node.label);

      g.append('text').attr('class','node-sub')
        .attr('y', NODE_R + ASSET_EXTRA + 15)
        .attr('font-size','9px')
        .text(node.sub);

      g.append('text').attr('class','node-value')
        .attr('y', NODE_R + ASSET_EXTRA + 27)
        .text(valueText(node))
        .attr('fill', valueColor(node));

    } else {
      /* rounded rect */
      g.append('rect')
        .attr('class','node-rect')
        .attr('x', -RECT_W/2).attr('y', -RECT_H/2)
        .attr('width', RECT_W).attr('height', RECT_H)
        .attr('rx', 8)
        .attr('fill', nodeFill(node))
        .attr('stroke', nodeStroke(node));

      g.append('text').attr('class','node-label')
        .attr('y', -4).text(node.label);

      g.append('text').attr('class','node-sub')
        .attr('y', 12).text(node.sub);

      g.append('text').attr('class','node-value')
        .attr('y', RECT_H/2 + 14)
        .text(valueText(node))
        .attr('fill', valueColor(node));
    }

    /* click → sheet */
    g.on('click', function(e) {
      e.stopPropagation();
      if (editMode) return;
      openSheet(node);
    });

    /* drag in edit mode */
    g.call(d3.drag()
      .filter(() => editMode)
      .on('start', function() {
        d3.select(this).raise();
      })
      .on('drag', function(event) {
        const box = boxes.find(b => b.name === node.category && b.visible);
        if (!box) return;
        let nx = node.cx + event.dx;
        let ny = node.cy + event.dy;
        /* clamp inside box */
        const mx = node.isAsset ? (NODE_R + ASSET_EXTRA) : RECT_W/2;
        const my = node.isAsset ? (NODE_R + ASSET_EXTRA) : RECT_H/2;
        nx = Math.max(box.x + mx + 2, Math.min(box.x + box.w - mx - 2, nx));
        ny = Math.max(box.y + my + 2, Math.min(box.y + box.h - my - 2, ny));
        node.cx = nx; node.cy = ny;
        d3.select(this).attr('transform', `translate(${nx},${ny})`);
        updateLinkPositions(false);
      })
      .on('end', function() {
        /* store offset for re-layout persistence */
        /* we recalculate dx/dy from natural position */
      })
    );
  });
}

function refreshPositions() {
  gNodes.selectAll('g.node-g')
    .attr('transform', d => `translate(${d.cx},${d.cy})`);
  gBoxes.selectAll('g').each(function(box) {
    d3.select(this).select('rect')
      .attr('x', box.x).attr('y', box.y)
      .attr('width', box.w).attr('height', box.h);
    d3.select(this).select('text')
      .attr('x', box.x + 12).attr('y', box.y + 18);
  });
  updateLinkPositions(false);
}

/* ── Node appearance helpers ── */
function nodeFill(n) {
  if (!n._dir || n._dir === 'flat') return '#2a2a3a';
  return n._dir === 'up' ? '#16a34a1a' : '#dc26261a';
}
function nodeStroke(n) {
  if (!n._dir || n._dir === 'flat') return '#555';
  return n._dir === 'up' ? '#16a34a' : '#dc2626';
}
function valueColor(n) {
  if (!n._dir || n._dir === 'flat') return '#555';
  return n._dir === 'up' ? '#16a34a' : '#dc2626';
}
function valueText(n) {
  if (n._val == null) return '';
  const arrow = n._dir === 'up' ? '\u25B2' : n._dir === 'down' ? '\u25BC' : '';
  let v = n._val;
  if (v >= 10000)   v = (v / 1000).toFixed(1) + 'K';
  else if (v >= 100) v = v.toFixed(1);
  else               v = v.toFixed(2);
  return v + ' ' + arrow;
}

/* ================================================================
   FIT VIEW
   ================================================================ */
function fitView(dur) {
  const svgW = window.innerWidth;
  const svgH = window.innerHeight - BAR_H;

  const vis = boxes.filter(b => b.visible);
  if (!vis.length) return;

  const pad = 20;
  const minX = Math.min(...vis.map(b => b.x)) - pad;
  const minY = Math.min(...vis.map(b => b.y)) - pad;
  const maxX = Math.max(...vis.map(b => b.x + b.w)) + pad;
  const maxY = Math.max(...vis.map(b => b.y + b.h)) + pad + 30;

  const cw = maxX - minX, ch = maxY - minY;
  if (cw <= 0 || ch <= 0) return;

  const scale = Math.min(svgW / cw, svgH / ch, 2.0);
  const tx = (svgW - cw * scale) / 2 - minX * scale;
  const ty = (svgH - ch * scale) / 2 - minY * scale;
  const t = d3.zoomIdentity.translate(tx, ty).scale(scale);

  if (dur > 0) svg.transition().duration(dur).call(zoomBehavior.transform, t);
  else         svg.call(zoomBehavior.transform, t);
}

/* ================================================================
   APPLY LEVEL (핵심 함수)
   ================================================================ */
function applyLevel(lv) {
  currentLevel = lv;

  /* reset drag offsets */
  DATA.nodes.forEach(n => { n.dx = 0; n.dy = 0; });

  /* 1. recompute layout: visible nodes → box heights → stack y */
  computeLayout();

  /* 2. re-render everything (simple & correct) */
  renderAll();

  /* 3. fit view with animation */
  fitView(400);

  /* 4. update button UI */
  document.querySelectorAll('#bottom-bar button[data-lv]').forEach(b => {
    b.classList.toggle('active', +b.dataset.lv === lv);
  });

  /* close sheet if open */
  closeSheet();
}

/* ================================================================
   BOTTOM SHEET
   ================================================================ */
function openSheet(node) {
  selectedNode = node;
  highlightNode(node);

  document.getElementById('sheet-title').textContent = node.label;
  document.getElementById('sheet-sub').textContent = node.sub + (node._val != null ? '  |  ' + valueText(node) : '');
  document.getElementById('sheet-desc').textContent = node.description || '';
  document.getElementById('sheet-interp').innerHTML = '';

  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('bottom-sheet').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('bottom-sheet').classList.remove('show');
  clearHighlight();
  selectedNode = null;
}

document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
svg.on('click.sheet', () => { if (!editMode) closeSheet(); });

/* ── Sim buttons ── */
document.getElementById('btn-sim-up').addEventListener('click', () => {
  if (selectedNode) runSim(selectedNode, 'up');
});
document.getElementById('btn-sim-down').addEventListener('click', () => {
  if (selectedNode) runSim(selectedNode, 'down');
});

/* ================================================================
   BFS SIMULATION — "오르면? / 내리면?"
   ================================================================ */
function runSim(startNode, direction) {
  const visited = new Set([startNode.id]);
  const queue   = [{ id: startNode.id, dir: direction }];
  const results = [];

  while (queue.length) {
    const cur = queue.shift();

    DATA.links.forEach(link => {
      if (link.source !== cur.id) return;
      const tgt = nodeMap[link.target];
      if (!tgt || tgt.level > currentLevel) return;
      if (visited.has(link.target)) return;
      visited.add(link.target);

      let rDir;
      if (link.type === '비례')        rDir = cur.dir;
      else if (link.type === '반비례') rDir = (cur.dir === 'up' ? 'down' : 'up');
      else                             rDir = 'cond';

      results.push({ node: tgt, dir: rDir, link });
      queue.push({ id: link.target, dir: rDir });
    });
  }

  /* display in sheet */
  const dirLabel = direction === 'up' ? '상승' : '하락';
  let html = `<div style="font-weight:700;margin-bottom:8px;font-size:13px;">
    ${startNode.label} ${dirLabel} 시 연쇄 효과:</div>`;

  if (!results.length) {
    html += '<div style="color:#64748b;">영향받는 노드 없음</div>';
  } else {
    results.forEach(r => {
      const icon = r.dir === 'up'
        ? '<span style="color:#16a34a">&#9650; 상승</span>'
        : r.dir === 'down'
          ? '<span style="color:#dc2626">&#9660; 하락</span>'
          : '<span style="color:#ca8a04">&#9670; 조건부</span>';
      html += `<div style="padding:4px 0;border-bottom:1px solid #ffffff08;">
        <b>${r.node.label}</b> ${icon}
        <span style="color:#64748b;font-size:11px;margin-left:4px;">${r.link.description}</span>
      </div>`;
    });
  }
  document.getElementById('sheet-interp').innerHTML = html;

  /* highlight simulation path */
  const affIds  = new Set([startNode.id, ...results.map(r => r.node.id)]);
  const affLink = new Set(results.map(r => r.link.id));

  gNodes.selectAll('g.node-g').classed('node-dim', d => !affIds.has(d.id));
  gLinks.selectAll('line.link-line')
    .classed('link-dim', d => !affLink.has(d.id))
    .classed('link-hl',  d => affLink.has(d.id));
}

/* ================================================================
   HIGHLIGHT / DIM
   ================================================================ */
function highlightNode(node) {
  const conn = new Set([node.id]);
  DATA.links.forEach(l => {
    if (l.source === node.id) conn.add(l.target);
    if (l.target === node.id) conn.add(l.source);
  });

  gNodes.selectAll('g.node-g').classed('node-dim', d => !conn.has(d.id));
  gLinks.selectAll('line.link-line')
    .classed('link-dim', d => d.source !== node.id && d.target !== node.id)
    .classed('link-hl',  d => d.source === node.id || d.target === node.id);
}

function clearHighlight() {
  gNodes.selectAll('g.node-g').classed('node-dim', false);
  gLinks.selectAll('line.link-line').classed('link-dim', false).classed('link-hl', false);
}

/* ================================================================
   SEARCH
   ================================================================ */
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { clearHighlight(); return; }

  const matched = DATA.nodes.filter(n =>
    n.level <= currentLevel && (
      n.label.toLowerCase().includes(q) ||
      n.sub.toLowerCase().includes(q) ||
      (n.description && n.description.toLowerCase().includes(q)) ||
      (n.tags && n.tags.some(t => t.toLowerCase().includes(q)))
    )
  );
  const ids = new Set(matched.map(n => n.id));

  gNodes.selectAll('g.node-g').classed('node-dim', d => d.level <= currentLevel && !ids.has(d.id));
  gLinks.selectAll('line.link-line').classed('link-dim', true).classed('link-hl', false);

  /* auto-pan to single result */
  if (matched.length === 1) {
    const n = matched[0];
    const svgW = window.innerWidth, svgH = window.innerHeight - BAR_H;
    const sc = 1.2;
    const t = d3.zoomIdentity.translate(svgW/2 - n.cx*sc, svgH/2 - n.cy*sc).scale(sc);
    svg.transition().duration(350).call(zoomBehavior.transform, t);
  }
});

/* ================================================================
   CATEGORY FILTER
   ================================================================ */
function applyCategoryFilter(catName) {
  if (catFilter === catName) {
    catFilter = null; // toggle off
  } else {
    catFilter = catName;
  }

  gNodes.selectAll('g.node-g')
    .attr('display', d => {
      if (d.level > currentLevel) return 'none';
      if (catFilter && d.category !== catFilter) return 'none';
      return null;
    });

  gLinks.selectAll('line.link-line')
    .attr('display', d => {
      if (!linkVisible(d)) return 'none';
      if (catFilter) {
        const s = nodeMap[d.source], t = nodeMap[d.target];
        if (s.category !== catFilter && t.category !== catFilter) return 'none';
      }
      return null;
    });

  gBoxes.selectAll('g').each(function(box) {
    const show = !catFilter || box.name === catFilter;
    d3.select(this).attr('display', show && box.visible ? null : 'none');
  });
}

/* ================================================================
   EVENTS
   ================================================================ */
function bindEvents() {
  /* Level buttons */
  document.getElementById('btn-lv1').addEventListener('click', () => applyLevel(1));
  document.getElementById('btn-lv2').addEventListener('click', () => applyLevel(2));
  document.getElementById('btn-lv3').addEventListener('click', () => applyLevel(3));

  /* Edit mode */
  document.getElementById('btn-edit').addEventListener('click', function() {
    editMode = !editMode;
    this.classList.toggle('active', editMode);
    this.textContent = editMode ? '완료' : '수정';
  });

  /* Resize */
  window.addEventListener('resize', () => { W = innerWidth; H = innerHeight; fitView(200); });

  /* ESC to close sheet */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeSheet();
  });
}
</script>
