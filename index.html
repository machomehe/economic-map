function calcPortfolioImpact() {
  const resultEl = document.getElementById('port-result');
  resultEl.textContent = '';

  const weights = {};
  document.querySelectorAll('#port-inputs input').forEach(inp => {
    weights[inp.dataset.nodeId] = parseFloat(inp.value) || 0;
  });

  const totalWeight = Object.values(weights).reduce((a, b) => a + b, 0);
  if (totalWeight === 0) {
    resultEl.textContent = '비중을 입력해주세요.';
    return;
  }

  /* 현재 변화율 기반 포트폴리오 영향 */
  let portfolioPct = 0;
  const details = [];

  Object.entries(weights).forEach(([nodeId, weight]) => {
    if (weight <= 0) return;
    const node = nodeMap[nodeId];
    if (!node || node._pct == null) return;
    const contribution = (weight / totalWeight) * node._pct;
    portfolioPct += contribution;
    details.push({ label: node.label, weight, pct: node._pct, contribution });
  });

  /* 결과 표시 */
  const header = document.createElement('div');
  header.style.cssText = 'font-size:14px;font-weight:700;margin-bottom:10px;color:' + (portfolioPct >= 0 ? '#22c55e' : '#dc2626') + ';';
  header.textContent = '포트폴리오 예상 영향: ' + (portfolioPct >= 0 ? '+' : '') + portfolioPct.toFixed(2) + '%';
  resultEl.appendChild(header);

  details.forEach(d => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #ffffff08;font-size:11px;';
    const left = document.createElement('span');
    left.textContent = d.label + ' (' + d.weight.toFixed(0) + '%)';
    const right = document.createElement('span');
    right.style.color = d.contribution >= 0 ? '#22c55e' : '#dc2626';
    right.textContent = (d.contribution >= 0 ? '+' : '') + d.contribution.toFixed(2) + '%';
    row.append(left, right);
    resultEl.appendChild(row);
  });

  /* 경고 */
  if (Math.abs(portfolioPct) > 3) {
    const warn = document.createElement('div');
    warn.style.cssText = 'margin-top:10px;padding:8px;background:#dc262622;border:1px solid #dc262655;border-radius:8px;font-size:11px;color:#f87171;';
    warn.textContent = '\u26A0 현재 변동성이 높습니다. 리밸런싱을 검토하세요.';
    resultEl.appendChild(warn);
  }
}

/* ================================================================
   EVENTS
   ================================================================ */
function bindEvents() {
  /* Level buttons */
  document.getElementById('btn-lv1').addEventListener('click', () => applyLevel(1));
  document.getElementById('btn-lv2').addEventListener('click', () => applyLevel(2));
  document.getElementById('btn-lv3').addEventListener('click', () => applyLevel(3));

  /* 검색 토글 */
  document.getElementById('btn-search-toggle').addEventListener('click', () => {
    const bar = document.getElementById('search-bar');
    const visible = bar.style.display !== 'none';
    bar.style.display = visible ? 'none' : 'block';
    if (!visible) document.getElementById('search-input').focus();
  });

  /* Edit mode */
  document.getElementById('btn-edit').addEventListener('click', function() {
    editMode = !editMode;
    this.classList.toggle('active', editMode);
    this.textContent = editMode ? '완료' : '수정';
    document.getElementById('btn-reset').style.display = editMode ? '' : 'none';
  });

  /* Reset positions */
  document.getElementById('btn-reset').addEventListener('click', function() {
    if (confirm('노드 위치를 초기 상태로 되돌릴까요?')) {
      resetPositions();
    }
  });

  /* PNG 내보내기 */
  document.getElementById('btn-export').addEventListener('click', () => {
    const svgEl = document.getElementById('svg');
    const serializer = new XMLSerializer();
    const svgStr = serializer.serializeToString(svgEl);
    const canvas = document.createElement('canvas');
    const bbox = svgEl.getBoundingClientRect();
    canvas.width = bbox.width * 2;
    canvas.height = bbox.height * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.fillStyle = '#0f0f14';
    ctx.fillRect(0, 0, bbox.width, bbox.height);
    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, bbox.width, bbox.height);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = 'economic-map.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    img.src = url;
  });

  /* 대시보드 토글 */
  document.getElementById('btn-dashboard').addEventListener('click', () => {
    const panel = document.getElementById('dashboard-panel');
    if (panel.style.display === 'none') {
      renderDashboard();
      panel.style.display = 'block';
    } else {
      panel.style.display = 'none';
    }
  });
  document.getElementById('btn-dash-close').addEventListener('click', () => {
    document.getElementById('dashboard-panel').style.display = 'none';
  });

  /* Resize */
  window.addEventListener('resize', () => { W = innerWidth; H = innerHeight; fitView(200); });

  /* ESC to close sheet / deselect */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('bottom-sheet').classList.contains('show')) {
        closeSheet();
      } else if (selectedNode) {
        selectedNode = null;
        clearHighlight();
      }
    }
  });

  /* 포트폴리오 */
  document.getElementById('btn-portfolio').addEventListener('click', () => {
    closeSheet();
    openPortfolio();
  });
  document.getElementById('btn-port-close').addEventListener('click', () => {
    document.getElementById('portfolio-panel').style.display = 'none';
  });
  document.getElementById('btn-port-calc').addEventListener('click', calcPortfolioImpact);
}

/* ================================================================
   TASK 2-2: HOVER EFFECT
   ================================================================ */
let hoverActive = false;

function addHoverEvents() {
  gNodes.selectAll('g.node-g')
    .on('mouseenter', function(e, d) {
      if (editMode || selectedNode) return;
      hoverActive = true;
      highlightNode(d);
    })
    .on('mouseleave', function() {
      if (editMode || selectedNode) return;
      if (!hoverActive) return;
      hoverActive = false;
      clearHighlight();
    });
}

/* ================================================================
   TASK 2-3: LINK TOAST
   ================================================================ */
let toastTimer = null;

function showLinkToast(link) {
  const srcNode = nodeMap[link.source];
  const tgtNode = nodeMap[link.target];
  if (!srcNode || !tgtNode) return;

  const el = document.getElementById('link-toast');
  el.textContent = '';

  const titleDiv = document.createElement('div');
  titleDiv.style.cssText = 'font-weight:700;margin-bottom:4px;';
  titleDiv.textContent = srcNode.label + ' \u2192 ' + tgtNode.label;

  const typeDiv = document.createElement('div');
  typeDiv.style.marginBottom = '4px';
  const typeSpan = document.createElement('span');
  if (link.type === '비례') {
    typeSpan.style.color = '#16a34a';
    typeSpan.textContent = '비례 \u25B2\u25B2';
  } else {
    typeSpan.style.color = '#dc2626';
    typeSpan.textContent = '반비례 \u25B2\u25BC';
  }
  typeDiv.appendChild(typeSpan);

  const descDiv = document.createElement('div');
  descDiv.style.color = '#94a3b8';
  descDiv.textContent = link.description || '';

  el.append(titleDiv, typeDiv, descDiv);

  /* 시차/관계 메타 */
  if (link.lag || link.relation) {
    const metaDiv = document.createElement('div');
    metaDiv.style.cssText = 'color:#6366f1;font-size:10px;margin-top:4px;';
    const parts = [];
    if (link.lag) parts.push('\u23F1 시차: ' + link.lag);
    if (link.relation) parts.push(link.relation === 'causal' ? '\u2192 인과관계' : '\u2194 상관관계');
    metaDiv.textContent = parts.join('  |  ');
    el.appendChild(metaDiv);
  }

  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
}

/* ================================================================
   TASK 2-4: SPARKLINE
   ================================================================ */
function renderSparkline(node) {
  const container = document.getElementById('sheet-spark');
  container.textContent = '';

  if (!VALS || !VALS.data || !node.dataSource || !node.dataSource.fred) return;
  const series = VALS.data[node.dataSource.fred];
  if (!series || series.length < 2) return;

  /* 최근 포인트 (오래된 순서로 정렬) */
  const pts = series.slice().reverse();
  const vals = pts.map(p => parseFloat(p.value));
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const W = container.clientWidth || 300;
  const H = 80;
  const padL = 36, padR = 36, padY = 10;
  const plotW = W - padL - padR;
  const plotH = H - padY * 2;

  const first = vals[0], last = vals[vals.length - 1];
  const isUp = last >= first;
  const lineColor = isUp ? '#16a34a' : '#dc2626';

  /* SVG */
  const svgNs = 'http://www.w3.org/2000/svg';
  const svgEl = document.createElementNS(svgNs, 'svg');
  svgEl.setAttribute('width', '100%');
  svgEl.setAttribute('height', H);
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svgEl.setAttribute('preserveAspectRatio', 'none');
  svgEl.style.display = 'block';
  svgEl.style.margin = '8px 0';

  /* 라인 path */
  let d = '';
  vals.forEach((v, i) => {
    const x = padL + (i / (vals.length - 1)) * plotW;
    const y = padY + plotH - ((v - minV) / range) * plotH;
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  });

  const path = document.createElementNS(svgNs, 'path');
  path.setAttribute('d', d);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', lineColor);
  path.setAttribute('stroke-width', '1.8');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('stroke-linejoin', 'round');
  svgEl.appendChild(path);

  /* 시작 값 라벨 */
  const fmtVal = (v) => {
    if (Math.abs(v) >= 10000) return (v/1000).toFixed(1) + 'K';
    if (Math.abs(v) >= 100)   return v.toFixed(1);
    return v.toFixed(2);
  };

  const txtStart = document.createElementNS(svgNs, 'text');
  txtStart.setAttribute('x', padL - 4);
  txtStart.setAttribute('y', padY + plotH - ((first - minV) / range) * plotH + 4);
  txtStart.setAttribute('text-anchor', 'end');
  txtStart.setAttribute('fill', '#64748b');
  txtStart.setAttribute('font-size', '9px');
  txtStart.textContent = fmtVal(first);
  svgEl.appendChild(txtStart);

  const txtEnd = document.createElementNS(svgNs, 'text');
  txtEnd.setAttribute('x', padL + plotW + 4);
  txtEnd.setAttribute('y', padY + plotH - ((last - minV) / range) * plotH + 4);
  txtEnd.setAttribute('text-anchor', 'start');
  txtEnd.setAttribute('fill', lineColor);
  txtEnd.setAttribute('font-size', '9px');
  txtEnd.setAttribute('font-weight', '700');
  txtEnd.textContent = fmtVal(last);
  svgEl.appendChild(txtEnd);

  /* 시간축 라벨 (시작일/종료일) */
  const fmtDate = (d) => d.replace(/-/g, '.').slice(2); // "2025.01.15" → "25.01.15"
  const dateStart = document.createElementNS(svgNs, 'text');
  dateStart.setAttribute('x', padL);
  dateStart.setAttribute('y', H - 2);
  dateStart.setAttribute('text-anchor', 'start');
  dateStart.setAttribute('fill', '#4a5568');
  dateStart.setAttribute('font-size', '8px');
  dateStart.textContent = fmtDate(pts[0].date);
  svgEl.appendChild(dateStart);

  const dateEnd = document.createElementNS(svgNs, 'text');
  dateEnd.setAttribute('x', padL + plotW);
  dateEnd.setAttribute('y', H - 2);
  dateEnd.setAttribute('text-anchor', 'end');
  dateEnd.setAttribute('fill', '#4a5568');
  dateEnd.setAttribute('font-size', '8px');
  dateEnd.textContent = fmtDate(pts[pts.length - 1].date);
  svgEl.appendChild(dateEnd);

  /* 호버 툴팁: 투명 rect 위에 mousemove → 날짜+값 표시 */
  const overlay = document.createElementNS(svgNs, 'rect');
  overlay.setAttribute('x', padL);
  overlay.setAttribute('y', padY);
  overlay.setAttribute('width', plotW);
  overlay.setAttribute('height', plotH);
  overlay.setAttribute('fill', 'transparent');
  overlay.style.cursor = 'crosshair';

  const tooltipG = document.createElementNS(svgNs, 'g');
  tooltipG.style.display = 'none';
  const tooltipLine = document.createElementNS(svgNs, 'line');
  tooltipLine.setAttribute('stroke', '#6366f1');
  tooltipLine.setAttribute('stroke-width', '1');
  tooltipLine.setAttribute('stroke-dasharray', '3,2');
  tooltipLine.setAttribute('y1', padY);
  tooltipLine.setAttribute('y2', padY + plotH);
  tooltipG.appendChild(tooltipLine);

  const tooltipDot = document.createElementNS(svgNs, 'circle');
  tooltipDot.setAttribute('r', '3');
  tooltipDot.setAttribute('fill', lineColor);
  tooltipG.appendChild(tooltipDot);

  const tooltipText = document.createElementNS(svgNs, 'text');
  tooltipText.setAttribute('fill', '#e2e8f0');
  tooltipText.setAttribute('font-size', '9px');
  tooltipText.setAttribute('font-weight', '600');
  tooltipG.appendChild(tooltipText);

  svgEl.appendChild(tooltipG);
  svgEl.appendChild(overlay);

  overlay.addEventListener('mousemove', (e) => {
    const rect = svgEl.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.round(((mx - padL) / plotW) * (vals.length - 1));
    const ci = Math.max(0, Math.min(vals.length - 1, idx));
    const cx = padL + (ci / (vals.length - 1)) * plotW;
    const cy = padY + plotH - ((vals[ci] - minV) / range) * plotH;
    tooltipG.style.display = '';
    tooltipLine.setAttribute('x1', cx);
    tooltipLine.setAttribute('x2', cx);
    tooltipDot.setAttribute('cx', cx);
    tooltipDot.setAttribute('cy', cy);
    tooltipText.setAttribute('x', cx);
    tooltipText.setAttribute('y', padY - 4);
    tooltipText.setAttribute('text-anchor', cx > W / 2 ? 'end' : 'start');
    tooltipText.textContent = fmtDate(pts[ci].date) + '  ' + fmtVal(vals[ci]);
  });
  overlay.addEventListener('mouseleave', () => { tooltipG.style.display = 'none'; });

  container.appendChild(svgEl);
}

(function initLegend() {
  const box = document.getElementById('legend-box');
  const items = document.getElementById('legend-items');
  const btn = document.getElementById('legend-toggle');
  const KEY = 'economic-map-legend-collapsed';
  let collapsed = localStorage.getItem(KEY) === '1';

  function render() {
    items.style.display = collapsed ? 'none' : 'block';

  });

})();

/* ================================================================
   ONBOARDING
   ================================================================ */
(function initOnboarding() {
  const overlay = document.getElementById('onboard-overlay');
  if (localStorage.getItem('economic-map-onboarded') === '1') { overlay.remove(); return; }

  const steps = [
    '노드를 탭하면 상세 정보를\n볼 수 있어요',
    "'오르면?/내리면?' 버튼으로\n연쇄 효과를 확인하세요",
    "하단의 핵심/기본/심화로\n복잡도를 조절하세요"
  ];
  let cur = 0;

  const stepEl  = document.getElementById('onboard-step');
  const dotsEl  = document.getElementById('onboard-dots');
  const nextBtn = document.getElementById('ob-next');
  const skipBtn = document.getElementById('ob-skip');

  function show() {
    stepEl.textContent = steps[cur];
    dotsEl.textContent = '';
    steps.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.className = 'ob-dot' + (i === cur ? ' active' : '');
      dotsEl.appendChild(dot);
    });
    nextBtn.textContent = cur === steps.length - 1 ? '시작하기' : '다음';
  }

  function finish() {
    localStorage.setItem('economic-map-onboarded', '1');
    overlay.remove();
  }

  nextBtn.addEventListener('click', () => {
    if (cur >= steps.length - 1) { finish(); return; }
    cur++;
    show();
  });
  skipBtn.addEventListener('click', finish);
  show();
})();
