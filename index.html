<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>경제 지표 관계도</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" media="print" onload="this.media='all'">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  font-family:'Pretendard Variable',-apple-system,sans-serif;
  background:#0f0f14;color:#eee;
  overflow:hidden;width:100%;height:100%;
  -webkit-tap-highlight-color:transparent;
}
#canvas{width:100%;height:100%;display:block}

/* 상단 바 */
#top-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;display:flex;flex-direction:column;gap:8px;z-index:20;pointer-events:none}
#top-bar>*{pointer-events:auto}
#top-row{display:flex;align-items:center;gap:8px}
#search-wrap{position:relative;flex:1;max-width:360px}
#search{width:100%;padding:10px 14px 10px 36px;border:1px solid #333;border-radius:12px;background:#1a1a24ee;color:#eee;font-size:14px;font-family:inherit;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#search::placeholder{color:#666}
#search:focus{border-color:#60a5fa}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666;font-size:14px;pointer-events:none}
#search-results{position:absolute;top:100%;left:0;right:0;background:#1a1a24f0;border:1px solid #333;border-radius:10px;margin-top:4px;max-height:200px;overflow-y:auto;display:none;backdrop-filter:blur(8px)}
.result-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #222;display:flex;align-items:center;gap:8px;min-height:44px}
.result-item:last-child{border-bottom:none}
.result-item:hover,.result-item:active{background:#ffffff10}
.result-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.result-label{font-weight:600}
.result-sub{color:#888;font-size:11px;margin-left:4px}

/* 필터 + 레벨 */
#filter-row{display:flex;gap:8px;align-items:center}
#level-btns{display:flex;gap:4px;flex-shrink:0}
.level-btn{padding:6px 12px;border-radius:16px;border:1px solid #333;background:#1a1a24dd;color:#aaa;font-size:11px;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;min-height:30px}
.level-btn.active{background:#60a5fa;color:#000;border-color:#60a5fa}
#filters{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;flex:1}
#filters::-webkit-scrollbar{display:none}
/* 수정 버튼 */
.top-btn{width:40px;height:40px;border:1px solid #333;border-radius:10px;background:#1a1a24ee;color:#aaa;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);flex-shrink:0;transition:all .2s}
.top-btn.active{border-color:#60a5fa;color:#60a5fa;background:#60a5fa18}
#edit-banner{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;background:#60a5fa22;border-top:1px solid #60a5fa44;text-align:center;font-size:12px;color:#60a5fa;font-weight:600;z-index:25;display:none}
#edit-banner.show{display:block}

.filter-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #333;background:#1a1a24dd;color:#aaa;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .2s;min-height:34px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.filter-btn.active{border-color:var(--c);color:var(--c);background:var(--bg)}

/* 범례 */
#legend{position:fixed;bottom:12px;left:12px;font-size:11px;color:#555;z-index:15;display:flex;flex-direction:column;gap:4px;transition:opacity .3s}
#legend.hidden{opacity:0;pointer-events:none}
#legend div{display:flex;align-items:center;gap:6px}
.line-sample{width:24px;height:3px;border-radius:2px}

/* 바텀시트 */
#sheet{position:fixed;bottom:0;left:0;right:0;background:#1a1a24;border-top:1px solid #333;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:30;max-height:55vh;overflow-y:auto;padding:0 20px 24px;-webkit-overflow-scrolling:touch}
#sheet.show{transform:translateY(0)}
.handle{width:36px;height:4px;background:#444;border-radius:4px;margin:10px auto 14px}
.sh-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.sh-cat{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.sh-title{font-size:18px;font-weight:700}
.sh-sub{font-size:13px;color:#888;margin-bottom:6px}
.sh-desc{font-size:13px;color:#bbb;line-height:1.7;margin-bottom:14px}
.sim-btns{display:flex;gap:10px;margin-bottom:8px}
.sim-btn{flex:1;padding:12px;border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;min-height:48px}
.sim-up{background:#16a34a22;color:#16a34a;border:1px solid #16a34a33}
.sim-up:active{background:#16a34a44}
.sim-down{background:#dc262622;color:#dc2626;border:1px solid #dc262633}
.sim-down:active{background:#dc262644}
.sim-result h4{font-size:13px;color:#888;margin-bottom:8px;font-weight:600}
.sim-step{margin-bottom:10px}
.sim-step-label{font-size:11px;color:#666;margin-bottom:4px;font-weight:600}
.sim-items{display:flex;flex-wrap:wrap;gap:6px}
.sim-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;background:#ffffff08;border:1px solid #ffffff10;cursor:pointer;min-height:32px}
.sim-note{font-size:10px;color:#f59e0b;margin-top:4px}

/* 시뮬레이션 배너 */
#sim-bar{position:fixed;top:0;left:0;right:0;padding:10px 16px;background:#1a1a24ee;border-bottom:1px solid #333;display:none;align-items:center;justify-content:space-between;z-index:25;backdrop-filter:blur(8px)}
#sim-bar.show{display:flex}
#sim-bar-text{font-size:13px;font-weight:600}
#sim-exit{padding:6px 14px;border-radius:8px;border:1px solid #555;background:transparent;color:#eee;font-family:inherit;font-size:12px;cursor:pointer;min-height:34px}

/* SVG 요소 */
.cat-box{rx:12;ry:12;cursor:grab}.cat-box:active{cursor:grabbing}
.cat-label{font-size:12px;font-weight:700;pointer-events:none}
.node-circle{cursor:pointer;transition:opacity .3s}
.node-label{font-size:11px;font-weight:700;fill:#fff;text-anchor:middle;pointer-events:none;transition:opacity .3s}
.node-sub{font-size:8px;fill:#999;text-anchor:middle;pointer-events:none;transition:opacity .3s}
.node-touch{fill:transparent;cursor:pointer}
.link-line{fill:none;opacity:.35;transition:opacity .3s}
.link-desc{font-size:8px;fill:#666;text-anchor:middle;pointer-events:none;transition:opacity .3s}
.sim-arrow{font-size:16px;font-weight:800;text-anchor:middle;pointer-events:none;filter:drop-shadow(0 0 4px rgba(0,0,0,.8))}

/* dim/highlight */
.node-val,.node-chg{transition:opacity .3s}
.dimmed .node-circle,.dimmed .node-label,.dimmed .node-sub,.dimmed .node-val,.dimmed .node-chg{opacity:.08}
.dimmed .link-line,.dimmed .link-desc{opacity:.03}
.dimmed .cat-box{opacity:.3}
.dimmed .cat-label{opacity:.15}
.highlighted .node-circle,.highlighted .node-label{opacity:1}
.highlighted .node-sub{opacity:.8}
.highlighted .link-line{opacity:.7}
.highlighted .link-desc{opacity:.9}

/* 로딩 */
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f0f14;z-index:100;flex-direction:column;gap:12px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.node-label{font-size:10px}.node-sub{font-size:7px}}
</style>
</head>
<body>

<div id="loading">
  <div style="width:32px;height:32px;border:3px solid #333;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite"></div>
  <div style="color:#666;font-size:13px">관계도 로딩 중...</div>
</div>

<div id="top-bar">
  <div id="top-row">
    <div id="search-wrap">
      <span id="search-icon">&#x1F50D;</span>
      <input id="search" type="text" placeholder="지표 검색..." autocomplete="off">
      <div id="search-results"></div>
    </div>
    <div id="level-btns">
      <button class="level-btn active" data-level="1">핵심</button>
      <button class="level-btn" data-level="2">기본</button>
      <button class="level-btn" data-level="3">심화</button>
    </div>
    <button class="top-btn" id="edit-btn" title="배치 수정">&#x270F;&#xFE0F;</button>
  </div>
  <div id="filters"></div>
</div>

<div id="legend">
  <div><span class="line-sample" style="background:#16a34a"></span> 비례 (같이 움직임)</div>
  <div><span class="line-sample" style="background:#dc2626"></span> 반비례 (반대로 움직임)</div>
  <div><span class="line-sample" style="background:#ca8a04"></span> 조건부</div>
</div>

<div id="sim-bar">
  <span id="sim-bar-text"></span>
  <button id="sim-exit">닫기</button>
</div>

<div id="edit-banner">배치 수정 모드 — 노드와 그룹을 드래그하여 이동</div>
<svg id="canvas"></svg>

<div id="sheet">
  <div class="handle"></div>
  <div class="sh-header"><span class="sh-cat" id="sh-cat"></span><span class="sh-title" id="sh-title"></span></div>
  <div class="sh-sub" id="sh-sub"></div>
  <div class="sh-desc" id="sh-desc"></div>
  <div class="sim-btns" id="sim-btns">
    <button class="sim-btn sim-up" id="btn-up">&#9650; 오르면?</button>
    <button class="sim-btn sim-down" id="btn-down">&#9660; 내리면?</button>
  </div>
  <div class="sim-result" id="sim-result"></div>
</div>

<script>
(async function(){
  'use strict';

  // ============================================================
  //  데이터 로드
  // ============================================================
  let raw;
  try {
    const r = await fetch('data/data.json');
    if (!r.ok) throw new Error(r.status);
    raw = await r.json();
  } catch(e) {
    document.getElementById('loading').innerHTML='<div style="color:#f87171">데이터를 불러올 수 없습니다.</div>';
    return;
  }

  const categories = raw.categories || {};
  const nodes = (raw.nodes||[]).map(n=>({...n}));
  const links = (raw.links||[]).map(l=>({...l}));
  const catColor = c=>(categories[c]||{}).color||'#666';
  const GREEN='#16a34a', RED='#dc2626', YELLOW='#ca8a04';
  const linkColor = {'비례':GREEN,'반비례':RED,'조건부':YELLOW};
  const isCore = n=>n.tags&&n.tags.includes('핵심');
  const isAsset = n=>!!n.isAsset;

  if(!nodes.length){
    document.getElementById('loading').innerHTML='<div style="color:#888">데이터가 비어 있습니다.</div>';
    return;
  }

  // ============================================================
  //  실시간 값 로드
  // ============================================================
  const fredAlias = {'VIXCLS':'^VIX','NASDAQCOM':'^IXIC'};
  let valuesData = {};
  try {
    const vr = await fetch('data/values.json');
    if(vr.ok){
      const vj = await vr.json();
      valuesData = vj.data||{};
    }
  } catch(e){}

  // 각 노드에 값/변화 부여
  const fmtMap = {
    'FEDFUNDS':'%','DFII10':'%','DGS10':'%','T10Y2Y':'%p','BAMLH0A0HYM2':'%',
    'UNRATE':'%','CPIAUCSL':'idx','DTWEXBGS':'idx','DEXKOUS':'₩','DCOILWTICO':'$',
    'VIXCLS':'','NASDAQCOM':',','SP500':',','A191RL1Q225SBEA':'%','RSAFS':'M$'
  };

  function fmtVal(v, series){
    const f=fmtMap[series]||'';
    if(f==='%') return v.toFixed(2)+'%';
    if(f==='%p') return (v>=0?'+':'')+v.toFixed(2)+'%p';
    if(f==='$') return '$'+v.toFixed(1);
    if(f==='₩') return v.toFixed(0)+'원';
    if(f==='idx') return v.toFixed(1);
    if(f===',') return v.toLocaleString('en',{maximumFractionDigits:0});
    if(f==='M$') return (v/1000).toFixed(0)+'B$';
    return v.toFixed(2);
  }

  nodes.forEach(n=>{
    const fred = (n.dataSource||{}).fred||'';
    let series = fred;
    if(!valuesData[series]){
      for(const[fid,yid]of Object.entries(fredAlias)){
        if(yid===fred && valuesData[fid]){series=fid;break;}
      }
    }
    const obs = valuesData[series];
    if(obs && obs.length>=2){
      const cur = parseFloat(obs[0].value);
      const prev = parseFloat(obs[1].value);
      const chg = cur-prev;
      const pct = prev?((chg/Math.abs(prev))*100):0;
      n._val = fmtVal(cur, series);
      n._chgDir = chg>0?'up':chg<0?'down':'flat';
      n._chgText = (chg>0?'+':'')+(Math.abs(pct)>=1?pct.toFixed(1)+'%':chg.toFixed(2));
      n._date = obs[0].date;
    } else if(obs && obs.length===1){
      const cur = parseFloat(obs[0].value);
      n._val = fmtVal(cur, series);
      n._chgDir = 'flat';
      n._chgText = '';
    }
  });

  // ============================================================
  //  컬럼 기반 레이아웃 계산
  // ============================================================
  // 카테고리별 노드 그룹
  const catNodes = {};
  nodes.forEach(n=>{
    if(!catNodes[n.category]) catNodes[n.category]=[];
    catNodes[n.category].push(n);
  });

  // 컬럼 정의
  const colDef = [
    { label: '미국', cats: ['미국·지표', '미국·자산', '미국·리스크'] },
    { label: '한국', cats: ['한국·지표', '한국·자산'] }
  ];

  // 치수
  const nodeR = 18;
  const assetExtra = 10;
  const boxPadX = 16;
  const boxPadTop = 32;
  const boxPadBot = 30;
  const boxGap = 14;
  const colGap = 20;

  const getR = d => isAsset(d) ? nodeR + assetExtra : (isCore(d) ? nodeR + 4 : nodeR);

  // 박스 크기 계산 — 노드 원 + 라벨 + 값 텍스트 전체 높이 고려
  const boxInfo = {};
  colDef.forEach(col=>{
    col.cats.forEach(cat=>{
      if(!catNodes[cat]) return;
      const n = catNodes[cat].length;
      const isA = cat.includes('자산');
      const r = isA ? nodeR + assetExtra : nodeR;
      // 노드 전체 높이: 원(r) + sub(12) + val(14) + chg(13) + 여유
      const nodeH = r * 2 + 45;
      const spX = isA ? 86 : 66;
      const spY = nodeH + 8;
      const maxC = isA ? 3 : 4;
      const cols = Math.min(n, maxC);
      const rows = Math.ceil(n / cols);
      const w = boxPadX * 2 + cols * spX;
      const h = boxPadTop + rows * spY + boxPadBot;
      boxInfo[cat] = { w, h, cols, rows, spX, spY };
    });
  });

  // 컬럼 크기 계산
  const headerSpace = 28;
  const colInfo = colDef.map(col => {
    const validCats = col.cats.filter(c => catNodes[c] && boxInfo[c]);
    let maxW = 0, totalH = 0;
    validCats.forEach((cat, i) => {
      if (boxInfo[cat].w > maxW) maxW = boxInfo[cat].w;
      totalH += boxInfo[cat].h;
      if (i < validCats.length - 1) totalH += boxGap;
    });
    return { label: col.label, cats: validCats, width: maxW, height: totalH, x: 0, y: 0, centerX: 0 };
  });

  // 컬럼 가로 배치
  let cx = 0;
  colInfo.forEach(col => {
    col.x = cx;
    col.y = headerSpace;
    col.centerX = cx + col.width / 2;
    cx += col.width + colGap;
  });
  const totalW = cx - colGap;
  const totalH = Math.max(...colInfo.map(c => c.height)) + headerSpace;

  // 박스 및 노드 위치 계산
  colInfo.forEach(col => {
    let by = col.y;
    col.cats.forEach(cat => {
      const info = boxInfo[cat];
      info.x = col.x + (col.width - info.w) / 2;
      info.y = by;
      catNodes[cat].forEach((n, ni) => {
        const c = ni % info.cols;
        const r = Math.floor(ni / info.cols);
        n.x = info.x + boxPadX + info.spX / 2 + c * info.spX;
        n.y = info.y + boxPadTop + info.spY / 2 + r * info.spY;
      });
      by += info.h + boxGap;
    });
  });

  // ============================================================
  //  SVG + 줌
  // ============================================================
  let W=innerWidth, H=innerHeight;
  const svg = d3.select('#canvas').attr('width',W).attr('height',H);
  const zoomG = svg.append('g');

  const zoomBeh = d3.zoom().scaleExtent([0.3,4]).on('zoom',e=>zoomG.attr('transform',e.transform));
  svg.call(zoomBeh).on('dblclick.zoom',null);
  svg.on('click',e=>{if(e.target===svg.node())deselect()});

  // 초기 뷰: 전체가 보이도록 fit
  const pad = 60;
  const scaleX = (W-pad*2)/totalW;
  const scaleY = (H-pad*2)/totalH;
  const initScale = Math.min(scaleX, scaleY, 1.5);
  const initTx = (W - totalW*initScale)/2;
  const initTy = (H - totalH*initScale)/2;
  svg.call(zoomBeh.transform, d3.zoomIdentity.translate(initTx, initTy).scale(initScale));

  // 레이어
  const boxG = zoomG.append('g');
  const linkGrp = zoomG.append('g');
  const nodeGrp = zoomG.append('g');

  // ============================================================
  //  컬럼 헤더
  // ============================================================
  colInfo.forEach(col=>{
    zoomG.append('text')
      .attr('x', col.centerX)
      .attr('y', col.y - 15)
      .attr('text-anchor', 'middle')
      .attr('fill', '#888')
      .attr('font-size', '14px')
      .attr('font-weight', '700')
      .text(col.label);
  });

  // ============================================================
  //  카테고리 박스 그리기
  // ============================================================
  const allCats = colInfo.flatMap(col=>col.cats);
  const assetCatSet = new Set(['미국·자산','한국·자산']);

  allCats.forEach(cat=>{
    const info = boxInfo[cat];
    const c = catColor(cat);
    const g = boxG.append('g').attr('class','cat-group').datum({cat});
    const isAC = assetCatSet.has(cat);

    g.append('rect')
      .attr('class','cat-box')
      .attr('x',info.x).attr('y',info.y)
      .attr('width',info.w).attr('height',info.h)
      .attr('fill',c).attr('fill-opacity', isAC ? .1 : .06)
      .attr('stroke',c).attr('stroke-opacity', isAC ? .3 : .2);

    g.append('text')
      .attr('class','cat-label')
      .attr('x',info.x+12).attr('y',info.y+22)
      .attr('fill',c).attr('fill-opacity',.7)
      .text(cat);
  });

  // ============================================================
  //  링크 그리기
  // ============================================================
  const nodeMap = {};
  nodes.forEach(n=>{nodeMap[n.id]=n});
  links.forEach(l=>{
    if(typeof l.source==='string') l.source=nodeMap[l.source];
    if(typeof l.target==='string') l.target=nodeMap[l.target];
  });

  const linkEls = linkGrp.selectAll('g').data(links).join('g');
  const linkPaths = linkEls.append('path').attr('class','link-line')
    .attr('stroke',d=>linkColor[d.type]||'#666')
    .attr('stroke-width',d=>Math.max(1,(d.strength||1)*.8));
  const linkDescs = linkEls.append('text').attr('class','link-desc');

  // 링크 경로 계산 (곡선)
  function updateLinks(){
    linkPaths.attr('d',d=>{
      const sx=d.source.x,sy=d.source.y,tx=d.target.x,ty=d.target.y;
      const mx=(sx+tx)/2,my=(sy+ty)/2,dx=tx-sx,dy=ty-sy;
      const bend = Math.min(Math.sqrt(dx*dx+dy*dy)*0.2, 40);
      const cx=mx-dy/Math.sqrt(dx*dx+dy*dy+1)*bend;
      const cy=my+dx/Math.sqrt(dx*dx+dy*dy+1)*bend;
      return `M${sx},${sy} Q${cx},${cy} ${tx},${ty}`;
    });
    linkDescs
      .attr('x',d=>{
        const s=d.source,t=d.target,dx=t.x-s.x,dy=t.y-s.y;
        const dist=Math.sqrt(dx*dx+dy*dy+1);
        const bend=Math.min(dist*.2,40);
        const cx=(s.x+t.x)/2-dy/dist*bend;
        return(s.x+2*cx+t.x)/4;
      })
      .attr('y',d=>{
        const s=d.source,t=d.target,dx=t.x-s.x,dy=t.y-s.y;
        const dist=Math.sqrt(dx*dx+dy*dy+1);
        const bend=Math.min(dist*.2,40);
        const cy=(s.y+t.y)/2+dx/dist*bend;
        return(s.y+2*cy+t.y)/4;
      })
      .text(d=>d.description||d.type||'');
  }
  updateLinks();

  // ============================================================
  //  노드 그리기
  // ============================================================
  const nodeEls = nodeGrp.selectAll('g').data(nodes).join('g')
    .attr('transform',d=>`translate(${d.x},${d.y})`);

  // 터치 영역 — 자산 노드는 더 크게
  nodeEls.append('circle').attr('class','node-touch').attr('r',d=> isAsset(d) ? 38 : (isCore(d) ? 34 : 28));

  // 노드 색상: 상승=초록, 하락=빨강, 데이터 없음=회색
  const chgFill = d => d._chgDir==='up'?GREEN:d._chgDir==='down'?RED:'#555';

  nodeEls.append('circle').attr('class','node-circle').attr('r',d=>getR(d))
    .attr('fill',d=>chgFill(d))
    .attr('stroke','#ffffff33')
    .attr('stroke-width',d=> isAsset(d) ? 2.5 : 1.5);

  nodeEls.append('text').attr('class','node-label').attr('dy','.35em').text(d=>d.label);
  nodeEls.append('text').attr('class','node-sub').attr('dy','.35em')
    .attr('y',d=>getR(d)+12).text(d=>d.sub||'');

  // 실시간 값 표시
  nodeEls.filter(d=>d._val).each(function(d){
    const el=d3.select(this);
    const r=getR(d);
    const valY = r+26;
    const valColor = d._chgDir==='up'?GREEN:d._chgDir==='down'?RED:'#888';
    const arrow = d._chgDir==='up'?'\u25B2':d._chgDir==='down'?'\u25BC':'';
    el.append('text').attr('class','node-val')
      .attr('y',valY).attr('dy','.35em').attr('text-anchor','middle')
      .attr('fill',valColor).attr('font-size','10px').attr('font-weight','600')
      .attr('pointer-events','none')
      .text(d._val);
    if(d._chgText){
      el.append('text').attr('class','node-chg')
        .attr('y',valY+13).attr('dy','.35em').attr('text-anchor','middle')
        .attr('fill',valColor).attr('font-size','9px').attr('font-weight','600')
        .attr('pointer-events','none')
        .text(arrow+' '+d._chgText);
    }
  });

  nodeEls.on('click',(e,d)=>{e.stopPropagation();selectNode(d)});

  // ============================================================
  //  레벨 토글
  // ============================================================
  let currentLevel = 1;
  document.querySelectorAll('.level-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentLevel = parseInt(btn.dataset.level);
      document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyLevel();
    });
  });

  function applyLevel(){
    nodeEls.each(function(d){
      const visible = d.level <= currentLevel;
      d3.select(this).style('display', visible ? null : 'none');
    });
    linkEls.each(function(l){
      const sVis = l.source.level <= currentLevel;
      const tVis = l.target.level <= currentLevel;
      d3.select(this).style('display', (sVis && tVis) ? null : 'none');
    });
    // 카테고리 박스 — 해당 레벨에 표시할 노드가 없으면 숨기기
    boxG.selectAll('.cat-group').each(function(dd){
      const hasVisible = catNodes[dd.cat] && catNodes[dd.cat].some(n => n.level <= currentLevel);
      d3.select(this).style('display', hasVisible ? null : 'none');
    });
  }

  // 초기 레벨 적용
  applyLevel();

  // ============================================================
  //  수정 모드
  // ============================================================
  let editMode = false;
  const editBtn = document.getElementById('edit-btn');
  const editBanner = document.getElementById('edit-banner');
  editBtn.addEventListener('click',()=>{
    editMode=!editMode;
    editBtn.classList.toggle('active',editMode);
    editBanner.classList.toggle('show',editMode);
  });

  // 노드 드래그 — 수정 모드에서만 + 박스 안에 가두기
  nodeEls.call(d3.drag()
    .filter(()=>editMode)
    .on('start',(e,d)=>{e.sourceEvent.stopPropagation()})
    .on('drag',(e,d)=>{
      const info = boxInfo[d.category];
      if(!info){d.x=e.x;d.y=e.y;}
      else{
        const r = getR(d);
        d.x = Math.max(info.x+r+4, Math.min(info.x+info.w-r-4, e.x));
        d.y = Math.max(info.y+boxPadTop+r, Math.min(info.y+info.h-r-4, e.y));
      }
      d3.select(e.sourceEvent.target.closest('g')).attr('transform',`translate(${d.x},${d.y})`);
      updateLinks();
    })
  );

  // 박스 드래그 — 수정 모드에서만 + 내부 노드 전체 이동
  boxG.selectAll('.cat-group').call(d3.drag()
    .filter(()=>editMode)
    .on('start',function(e){
      d3.select(this).datum().startX = e.x;
      d3.select(this).datum().startY = e.y;
      e.sourceEvent.stopPropagation();
    })
    .on('drag',function(e){
      const dd = d3.select(this).datum();
      const dx = e.x - dd.startX, dy = e.y - dd.startY;
      dd.startX = e.x; dd.startY = e.y;
      const info = boxInfo[dd.cat];
      info.x += dx; info.y += dy;
      d3.select(this).select('.cat-box').attr('x',info.x).attr('y',info.y);
      d3.select(this).select('.cat-label').attr('x',info.x+12).attr('y',info.y+22);
      catNodes[dd.cat].forEach(n=>{n.x+=dx;n.y+=dy});
      nodeEls.filter(n=>n.category===dd.cat).attr('transform',n=>`translate(${n.x},${n.y})`);
      updateLinks();
    })
  );

  // 로딩 해제
  setTimeout(()=>document.getElementById('loading').classList.add('hide'),400);

  // ============================================================
  //  선택 / 하이라이트
  // ============================================================
  let selected=null, simMode=false;

  function selectNode(d){
    if(simMode)return;
    selected=d;
    const ids=new Set([d.id]), cLinks=new Set(), cCats=new Set([d.category]);
    links.forEach(l=>{
      const s=l.source.id,t=l.target.id;
      if(s===d.id||t===d.id){ids.add(s);ids.add(t);cLinks.add(l);
        cCats.add(nodes.find(n=>n.id===s).category);cCats.add(nodes.find(n=>n.id===t).category);}
    });
    nodeEls.each(function(n){d3.select(this).classed('dimmed',!ids.has(n.id)).classed('highlighted',ids.has(n.id))});
    linkEls.each(function(l){d3.select(this).classed('dimmed',!cLinks.has(l)).classed('highlighted',cLinks.has(l))});
    boxG.selectAll('.cat-group').each(function(dd){d3.select(this).classed('dimmed',!cCats.has(dd.cat))});
    nodeEls.select('.node-circle').transition().duration(250)
      .attr('r',n=>n.id===d.id? getR(n)+4 : getR(n));
    document.getElementById('legend').classList.add('hidden');
    showSheet(d);
  }

  function deselect(){
    if(simMode){exitSim();return}
    selected=null;
    nodeEls.classed('dimmed',false).classed('highlighted',false);
    linkEls.classed('dimmed',false).classed('highlighted',false);
    boxG.selectAll('.cat-group').classed('dimmed',false);
    nodeEls.select('.node-circle').transition().duration(250).attr('r',n=>getR(n));
    hideSheet();
    document.getElementById('legend').classList.remove('hidden');
  }

  // ============================================================
  //  바텀시트
  // ============================================================
  const sheet=document.getElementById('sheet');
  function showSheet(d){
    const c=catColor(d.category);
    document.getElementById('sh-cat').textContent=d.category||'';
    document.getElementById('sh-cat').style.cssText=`background:${c}22;color:${c}`;
    document.getElementById('sh-title').textContent=d.label;
    document.getElementById('sh-sub').textContent=d.sub||'';
    document.getElementById('sh-desc').textContent=d.description||'';
    document.getElementById('sim-result').innerHTML='';
    document.getElementById('sim-btns').style.display='flex';
    sheet.classList.add('show');
  }
  function hideSheet(){sheet.classList.remove('show')}
  let touchY=0;
  sheet.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY},{passive:true});
  sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-touchY>60)deselect()},{passive:true});

  // ============================================================
  //  시뮬레이션 ("오르면?/내리면?") — 레벨 필터링 적용
  // ============================================================
  document.getElementById('btn-up').addEventListener('click',()=>runSim('up'));
  document.getElementById('btn-down').addEventListener('click',()=>runSim('down'));
  document.getElementById('sim-exit').addEventListener('click',exitSim);

  function runSim(dir){
    if(!selected)return;
    simMode=true;
    const start=selected;
    const visited=new Map();visited.set(start.id,{sign:dir,step:0});
    const queue=[{id:start.id,sign:dir,step:0}];
    const adj=new Map();
    links.forEach(l=>{
      const s=l.source.id,t=l.target.id;
      if(!adj.has(s))adj.set(s,[]);if(!adj.has(t))adj.set(t,[]);
      adj.get(s).push({to:t,type:l.type});adj.get(t).push({to:s,type:l.type});
    });
    while(queue.length){
      const{id,sign,step}=queue.shift();
      if(step>=3)continue;
      for(const nb of(adj.get(id)||[])){
        if(visited.has(nb.to))continue;
        // 숨겨진 노드(레벨 초과) 스킵
        const targetNode = nodes.find(n=>n.id===nb.to);
        if(targetNode && targetNode.level > currentLevel) continue;
        const next=nb.type==='비례'?sign:nb.type==='반비례'?(sign==='up'?'down':'up'):'unknown';
        visited.set(nb.to,{sign:next,step:step+1});
        queue.push({id:nb.to,sign:next,step:step+1});
      }
    }

    const stepOp={0:1,1:1,2:.7,3:.4};
    const affectedCats=new Set();
    nodeEls.each(function(n){
      const el=d3.select(this),info=visited.get(n.id);
      el.selectAll('.sim-arrow').remove();
      if(info){
        affectedCats.add(n.category);
        el.classed('dimmed',false).classed('highlighted',true);
        el.select('.node-circle').transition().duration(400).style('opacity',stepOp[info.step]||.4);
        el.select('.node-label').transition().duration(400).style('opacity',stepOp[info.step]||.4);
        el.select('.node-sub').transition().duration(400).style('opacity',(stepOp[info.step]||.4)*.7);
        const r=getR(n);
        const[arrow,color]=info.sign==='up'?['\u2191',GREEN]:info.sign==='down'?['\u2193',RED]:['?',YELLOW];
        el.append('text').attr('class','sim-arrow').attr('x',r*.7).attr('y',-r*.6).attr('fill',color)
          .style('font-size',info.step===0?'20px':'16px').text(arrow);
      }else{
        el.classed('dimmed',true).classed('highlighted',false);
        el.select('.node-circle').transition().duration(400).style('opacity',.08);
        el.select('.node-label').transition().duration(400).style('opacity',.08);
        el.select('.node-sub').transition().duration(400).style('opacity',.04);
      }
    });
    linkEls.each(function(l){
      const el=d3.select(this),s=l.source.id,t=l.target.id;
      if(visited.has(s)&&visited.has(t)){
        const ms=Math.max(visited.get(s).step,visited.get(t).step);
        el.classed('dimmed',false).classed('highlighted',true);
        el.select('.link-line').transition().duration(400).style('opacity',ms<=1?.8:ms===2?.5:.3);
      }else{
        el.classed('dimmed',true).classed('highlighted',false);
        el.select('.link-line').transition().duration(400).style('opacity',.03);
      }
    });
    boxG.selectAll('.cat-group').each(function(dd){d3.select(this).classed('dimmed',!affectedCats.has(dd.cat))});

    showSimResult(visited,start);
    document.getElementById('sim-bar-text').textContent=`"${start.label}" ${dir==='up'?'상승':'하락'} 시 연쇄 효과`;
    document.getElementById('sim-bar').classList.add('show');
    document.getElementById('top-bar').style.display='none';
  }

  function showSimResult(visited,start){
    const res=document.getElementById('sim-result');
    const steps=[[],[],[]];
    visited.forEach((info,nid)=>{
      if(nid===start.id)return;
      if(info.step>=1&&info.step<=3){const n=nodes.find(nd=>nd.id===nid);if(n)steps[info.step-1].push({n,info})}
    });
    let html='<h4>연쇄 효과 분석</h4>';
    ['1단계 (직접 영향)','2단계 (간접 영향)','3단계 (파급 영향)'].forEach((name,i)=>{
      if(!steps[i].length)return;
      html+=`<div class="sim-step"><div class="sim-step-label">${name}</div><div class="sim-items">`;
      steps[i].forEach(({n,info})=>{
        const[style,txt]=info.sign==='up'?['color:#16a34a','\u2191']:info.sign==='down'?['color:#dc2626','\u2193']:['color:#ca8a04','?'];
        html+=`<span class="sim-chip" data-id="${n.id}"><span style="${style}">${txt}</span> ${n.label}</span>`;
      });
      html+='</div>';
      if(i===2)html+='<div class="sim-note">\u26A0 3단계 효과는 참고용입니다.</div>';
      html+='</div>';
    });
    res.innerHTML=html;
    res.querySelectorAll('.sim-chip[data-id]').forEach(el=>{
      el.addEventListener('click',()=>{const nd=nodes.find(n=>n.id===el.dataset.id);if(nd)focusNode(nd)});
    });
  }

  function exitSim(){
    simMode=false;
    nodeEls.each(function(n){
      const el=d3.select(this);
      el.classed('dimmed',false).classed('highlighted',false).selectAll('.sim-arrow').remove();
      el.select('.node-circle').transition().duration(300).style('opacity',1).attr('r',getR(n));
      el.select('.node-label').transition().duration(300).style('opacity',1);
      el.select('.node-sub').transition().duration(300).style('opacity',1);
    });
    linkEls.each(function(){d3.select(this).classed('dimmed',false).classed('highlighted',false);d3.select(this).select('.link-line').transition().duration(300).style('opacity',.35)});
    boxG.selectAll('.cat-group').classed('dimmed',false);
    hideSheet();
    document.getElementById('sim-bar').classList.remove('show');
    document.getElementById('top-bar').style.display='';
    document.getElementById('legend').classList.remove('hidden');
    selected=null;
    // 레벨 필터 재적용
    applyLevel();
  }

  // ============================================================
  //  검색 — 숨겨진 노드 제외
  // ============================================================
  const searchIn=document.getElementById('search'),searchRes=document.getElementById('search-results');
  searchIn.addEventListener('input',()=>{
    const q=searchIn.value.trim().toLowerCase();
    if(!q){searchRes.style.display='none';return}
    const m=nodes.filter(n=>{
      if(n.level > currentLevel) return false;
      return n.label.toLowerCase().includes(q)||(n.sub&&n.sub.toLowerCase().includes(q))||(n.category&&n.category.toLowerCase().includes(q));
    }).slice(0,8);
    if(!m.length){searchRes.style.display='none';return}
    searchRes.innerHTML=m.map(n=>`<div class="result-item" data-id="${n.id}"><span class="result-dot" style="background:${catColor(n.category)}"></span><span class="result-label">${n.label}</span><span class="result-sub">${n.sub||''}</span></div>`).join('');
    searchRes.style.display='block';
    searchRes.querySelectorAll('.result-item').forEach(el=>{
      el.addEventListener('click',()=>{const nd=nodes.find(n=>n.id===el.dataset.id);if(nd){searchIn.value='';searchRes.style.display='none';focusNode(nd);selectNode(nd)}});
    });
  });
  searchIn.addEventListener('blur',()=>setTimeout(()=>{searchRes.style.display='none'},200));

  function focusNode(d){
    const s=1.8;
    svg.transition().duration(600).call(zoomBeh.transform,d3.zoomIdentity.translate(W/2-d.x*s,H/2-d.y*s).scale(s));
  }

  // ============================================================
  //  카테고리 필터
  // ============================================================
  const filterBox=document.getElementById('filters'),activeFilters=new Set();
  allCats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-btn';btn.textContent=cat;
    const c=catColor(cat);btn.style.setProperty('--c',c);btn.style.setProperty('--bg',c+'22');
    btn.addEventListener('click',()=>{
      if(activeFilters.has(cat)){activeFilters.delete(cat);btn.classList.remove('active')}
      else{activeFilters.add(cat);btn.classList.add('active')}
      if(!activeFilters.size){
        nodeEls.classed('dimmed',false);linkEls.classed('dimmed',false);boxG.selectAll('.cat-group').classed('dimmed',false);return;
      }
      nodeEls.each(function(n){d3.select(this).classed('dimmed',!activeFilters.has(n.category))});
      linkEls.each(function(l){
        d3.select(this).classed('dimmed',!(activeFilters.has(l.source.category)&&activeFilters.has(l.target.category)));
      });
      boxG.selectAll('.cat-group').each(function(dd){d3.select(this).classed('dimmed',!activeFilters.has(dd.cat))});
    });
    filterBox.appendChild(btn);
  });

  // ============================================================
  //  리사이즈
  // ============================================================
  addEventListener('resize',()=>{
    W=innerWidth;H=innerHeight;svg.attr('width',W).attr('height',H);
  });

})();
</script>
</body>
</html>
